body:
  text: 原序曩予誦范文正公良相良醫之言未嘗不斂袵嘉歎何則良相輔弼元首治天下興利除害選賢任能使人樂其業而吾仁之見諸事者足以澤被四海良醫導和人身療百病脫痾起痼幹元氣而開夀域使人安其生而吾仁之藴諸心者亦足以波及萬姓葢出處之轍雖異而吾仁之用則同君子不可斯須而忘吾仁則吾仁之在天下亦不可勝用矣謙齋先生沙公志文正之所志學文正之所學輕車埋輪繡衣直指所至摧奸貪之膽拯生民之命由柏垣而登薇府一以是心民以是厚今為建昌守也殆將小試龔黄事業為異日姚宋張本良相之效豈不著哉然公猶以為未盡乃退而考訂名醫方書常經驗者分門别類為一十五卷鋟梓郡庠因目其書曰瑞竹堂經騐方以恵斯世噫如公之仁可謂至矣予故序諸篇端欲人之誦此書者不惟知公之心良於醫又當知公之志良於相二者皆自公仁心一㸃中出王都中序
