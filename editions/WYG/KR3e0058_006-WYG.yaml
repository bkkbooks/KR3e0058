body:
  text: 瑞竹堂經騐方卷四元沙圗穆蘇編女科飬氣丹治婦人年未及四十嵗天癸斷行每服五丸空心温酒送下在和劑局方芩心丸治婦人四十九嵗已後天癸當住每月却行或過多不止黄芩心枝條者二兩重用米醋浸七日炙乾又浸又炙如此七次右為細末醋糊為丸如梧桐子大每服七十丸空心温酒送下日進二服八珍􅄆治月水不調臍腹㽲痛全不思食臟腑怯弱泄㵼小腹堅痛時作寒熱此藥調暢榮衛滋飬氣血能補虚損當歸去蘆川芎熟地黄白芍藥人参去蘆甘草炙茯苓去皮白术各一兩右㕮咀每服三錢水一盞半生薑五片􅀥一枚煎至七分去滓不拘時候通口服血竭􅄆治婦人臍下血積疼痛血竭乳香没藥並别研水蛭鹽炒烟盡白芍藥當歸麝香各一錢虎骨火炙油盡黄一錢六分右為極細末每服三錢空心温酒調服沉香􅄆治婦人一切血氣刺痛不可忍者及男子冷氣痛並皆治之沉香木香當歸白茯苓白芍藥各一錢右㕮咀每服一錢水三盞銀石器内文武火煎數沸入全陳皮一箇又煎十沸入好醋一盞又煎十數沸入乳香没藥如皂角子大一塊同煎至一盞去滓通口服不拘時候治婦人血崩不止婦人油頭髪半兩燒灰千針草灰半兩右為細末每服三錢淋火煆秤錘調服治婦人吹妳鼠糞五十粒麝香一字右為細末食後用熱酒一盞調服立愈治産後血塊腹痛京芎炒川當歸炒乾地黄洗芍藥各半兩蒲黄一分銚内隔紙炒香右同為細末每服三錢空心温酒調服㓜科長生丸治小兒清上實下補脾治痰出陳文仲方木香半兩㯽榔三兩不見火枳殻一兩去瓤麵裹煨丁香三錢半夏三錢薑湯泡七次全蝎三十箇去毒尖肉豆蔲三錢縮砂三錢右除肉豆蔲外同為細末次入豆蔲再研極細末用飲和為丸如粟米大小兒每服三五十丸空心乳汁飲湯送下服訖候半時方進乳食日進三服吐乳者胃冷宜服此藥大便酸臭是傷食乳食不消是脾虚宜服此藥十金􅄆治小兒脾積其效甚速錦紋大黄不計多少為細末用米醋熬成膏澆於新磚瓦上再將大黄傾上用伏内日曬夜露乾為末舶上硫黄官粉各等分右為極細末每於食後米飲調下一嵗小兒一服半錢二三嵗服一錢十嵗以下服二錢十六七嵗服五錢一服即效如不愈隔二十日再一服更不須再服切忌生冷濕麫馬驢豬魚雞等肉如不能忌口枉服此藥曽經親手救人但能忌口者醫之必愈褐丸子治小兒隂陽不和臟腑怯弱乳食不消心腹脹滿嘔逆氣急或腸鳴泄㵼頻併腹中冷痛食癥乳癖痃氣痞結積聚腸胃或秘或利頭靣浮腫不思乳食及療五種疳氣八腫痢疾肌肉消瘦氣麄腹大神色昏憒情意不樂常服􅄆冷熱氣調和蔵府去疳積止㵼痢進飲食生肌肉悦顔色功效異常不能盡述出活㓜口訣方蘿蔔子二兩㣲炒陳皮去白一兩青皮去白一兩黑牽牛一兩半一半生用一半炒京三稜一兩泡蓬莪蒁一兩泡胡椒半兩木香一分不見火右為細末水煑麫糊為丸如梧桐子大每服二三十丸空心用蘿蔔子煎湯或薑湯送下看兒大小加减服之磨積丸専治小兒疳積泄㵼等疾荆三稜蓬莪蒁陳皮去白青皮去白神麴炒麥芽炒川鬱金胡黄連雷丸白者香附子炒去毛與三稜莪蒁陳皮青皮五件一處用好米醋煑一晝夜焙乾使君子肉切焙蘆㑹各等分右為細末米醋糊為丸如豌豆大每服三十丸糯米湯下茶湯亦可虚弱加木香虚極加癩蚵蚾肉如聖􅄆治小兒口瘡不能喫乳者川江子一粒或二粒右研爛不去油入硃砂或黄丹赤土少許剃開小兒􅇟門貼在􅇟上如四邊起粟米泡便用温水洗去藥恐成瘡便用菖蒲水洗便安其效如神治小兒出瘡疹眼内有雲翳方輕粉黄丹各等分右為末竹筒吹在耳内左眼有翳吹左耳右眼有翳吹右耳即退治小兒大人熱丹瘡成片可取絲茅草葉將丹瘡刮破即愈治小兒丹瘤綿羊腦子生用朴消右二味調匀貼於瘤上立效治小兒凍印瘡方用黒騾糞曬乾燒灰清油調搽立效大黄膏治小兒大人痺癖大黄朴硝各等分右為細末同蒜泥和成膏用絹帛攤成膏藥貼於病處其痺病自輭消白丁香雀兒糞也黑丁香二錢木香二錢蜜陀僧三錢硫黄二錢訶子皮輕粉半錢右為細末每服一錢用妳汁調服女兒用男兒妳汁調服男兒用女兒妳汁調服食前半饑半飽服日進三服用􅀥壓藥大人用米飲空心調服瑞竹堂經騐方卷四
