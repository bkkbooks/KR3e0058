body:
  text: 瑞竹堂經驗方卷一元沙圗穆蘇編調補益榮丹治心脉結而散肺脉浮而軟餘脉如經原其所自思慮傷心憂慮傷肺心乃諸血之源肺為諸氣之候心虚則血少脉弱則氣虚遂致目澀口苦唇燥舌鹹甚則齒為之痛鼻為之不利怔忡白濁腠理不宻易感風寒今以補氣湯補氣以養肺益榮丹滋血以助心榮衞日充心肺職治諸疾自愈當歸二兩去蘆酒浸焙紫石英火煆醋淬七次研細一兩栢子仁炒另硏酸棗仁去殻小草木香不見火茯苓去木桑寄生卷栢葉酒炙熟地黄洗凈酒蒸焙龍齒各一兩另研辰砂半兩另研右為細末煉蜜為丸如梧桐子大辰砂為衣每服七十丸食前用麥門冬湯下補氣湯黄耆二兩去蘆宻水炙人參甘草炙各半兩麥門冬一兩湯浸去心苦桔梗去蘆炒一兩右㕮咀每服四錢水一盞半生薑五片煎至七分去滓温服不拘時候補養丸補養元氣滋益氣血煖水臟及下元兎絲子洗净搗末四兩破故紙炒香益智仁各一兩杜仲一兩去皮用生薑自然汁拌勻炒斷絲山藥一兩剉碎炒黄茴香一兩半炒香蒼术二兩米泔浸切片麵炒右為細末酒糊為丸如梧桐子大每服五十丸空心温服鹽酒鹽湯任下杜仲丸補心腎益氣血煖元臟縮小便壯力蓮肉去心四兩龍骨七錢半新瓦上煆另研細益智仁破故紙炒香茴香各一兩微炒牛膝去苗一兩酒浸白茯神去皮木一兩杜仲去皮剉碎酒浸炒斷絲一兩兎絲子四兩桃仁湯炮去皮尖淨炒一兩右為細末用山藥四兩炙為末酒糊為丸如梧桐子大每服五十丸棗湯送下空心食前服如欲煖水藏減去蓮肉龍骨白茯神加好醋酒兼糟四兩蓮鬚葱白四兩蒼术四兩米泔水浸一夕切片合蓮鬚葱白酒糟搗淹一宿成餅曬乾炒令爇入前藥同研法製杏子杏仁一斤揀板杏真方用蒼术一斤白沙蜜二斤蒼术一兩去粗皮泔浸一宿麩炒半夏一兩薑汁浸一宿木香當歸人參各一兩右將杏仁用熱水洗凈頓於罐内將生蒼术一斤為粗末水熬一二百沸將汁浸杏仁封其口夏一日一夜春秋三日三夜冬五日五夜去蒼术及汁鍋内炒乾調入蜜半斤再炒少時取出將木香當歸人參半夏蒼术俱為細末拌於杏仁上冷定用磁罐盛頓再用生蜜半斤澆上每日空心細嚼三五十箇麫湯送下若氣不順加木香末一兩血不和加當歸末一兩若喘息加人參末一兩若婦人血氣不和加當歸服十寶丸補益肝脾腎三經其功不可具述破故紙酒浸一宿焙乾附子炮去皮臍蒼术剉泔浸一宿焙乾當歸去蘆焙各一兩石棗半兩去核枸杞子焙半兩兔絲子酒浸焙乾肉蓯蓉酒浸焙乾白茯苓去皮各半兩地黄去蘆揀肥壯者酒浸蒸久而透黒為度妙處全在此一味焙乾二兩右為細末醋糊為丸如梧桐子大每服三五十丸空心用温酒或鹽湯送下乾物壓之坎離丸治心脾腎三經不足蒼术八兩剉如豆大泔浸三日或焙或晒乾分作四處一分用真烏豆一兩去皮臍切作片子又用川楝子凈肉一兩同蒼术炒焦黄色為度一分用川椒去目一兩又用陳皮一兩破故紙一兩酒浸一宿炒令乾次下蒼术川椒同炒黄一分用茴香净一兩青鹽一兩半食鹽炒半兩先下蒼术炒熟次下茴香等同炒黄色一分用醇醲酒醋各一椀浸蒼术令自乾炒燥入後藥麥門冬去心三兩焙乾天門冬去心三錢焙茯神去皮木三分炒逺志去心三錢焙沉香一兩鹿茸燎去毛酥炙葫蘆芭酒浸炒川巴㦸各五錢去心酒浸炒當歸半兩酒浸焙人參去蘆枸杞子雀腦川芎陳皮去瓤各半兩右為細末好酒煮神麴末二兩打糊為丸如梧桐子大每服四五十丸空心服如補心棗湯下補腎温酒鹽湯下草還丹夫草還丹者不用金石不加燥熱不傷五臓只以草藥為用全在製度之妙得水火既濟之術奪丹砂燒煉之功大壯脾胃能進飲食且脾屬中央之土乃五臓之主一失調養則五臓俱虚百病由此而生此藥益精髓補腎經固元陽輕腰脚安五臓通九竅令人耳目聰明有一老人年七十以上常服此藥悦顔容烏髭髪固牙齒能夜書細字延年益夀乃仙家之良劑平補大有效驗蒼术四兩一兩酒浸一兩醋浸一兩泔浸一兩鹽水浸各一宿胡蘆芭一兩酒浸一宿破故紙一兩酒浸一宿覆盆子二錢揀凈茴香一錢新肥者川練子一兩木香半兩堅實者山藥堅白者穿山甲酥炙黄地龍去土凈茯苓堅圓者枸杞子牛膝各三錢酒浸一宿右晒乾為細末無灰酒糊為丸如梧桐子大每服三五十丸温酒送下鹽湯亦可乾物壓之空心服畢須行百歩使藥力行日進二服此方得之刑部令史王國寶渠𨽻事時有一僧子窩藏强盗部擬死渠入出之後僧子以此方謝囑云惟西平章有此方不可亂傳當珍藏之後渠入佐西平章於方册内得此方藥味分兩製度相同乃平章常服藥金鎻丹此藥延年益夀添精和血注顔壯骨養神調氣不可盡述逺志去心炒蛇床子酒浸微炒紫梢花鹿茸炒黄各一錢半海馬二對炒黄色黑牽牛取頭末三錢穿山甲五片炙黄木香乳香麝香各二錢半川茴香晩蠶蛾二錢續斷一錢半右為細末酒糊為丸如梧桐子大每服五十丸空心温酒送下七日可便見效消導沉香降氣丸治胷膈痞滿升降水火調順隂陽和中益氣推陳致新進美飲食沉香鎊木香蓽澄茄枳殻去瓤縮砂仁白豆蔲仁青皮去白陳皮去白廣木炮枳實麩炒黄連去鬚半夏薑製蘿蔔子另研各半兩白茯苓去皮一兩香附子二兩炒去皮毛白术一兩煨烏藥一兩半右為細末生薑自然汁浸蒸餅為丸如梧桐子大每服五七十丸臨卧煎橘皮湯下薑湯亦可日進一服忌生冷丁香爛飯丸治中脘胃痛消食快氣丁香京三稜炮木香廣茂各一錢炮縮砂仁益智仁丁皮甘松去土各三錢甘草三錢炙香附子五錢炒去毛右為細末蒸餅水浸去皮為丸如梧桐子大每服三五十丸白湯送下細嚼亦可不拘時候香稜丸消食快氣寛中利膈化痰京三稜廣茂青皮陳皮各剉醋煑焙乾蘿蔔子炒另研縮砂仁白豆蔲仁沉香木香半夏麴各一兩炒神麴炒麥糵炒另研各一兩阿魏半兩另研香附子炒去毛烏藥枳殻麩炒去瓤蓽澄茄㯽榔良薑各半兩右為細末以神麴麥糵阿魏末拌勻水和為丸如梧桐子大每服七八十丸薑湯下不拘時候木香枳殻丸治中焦氣澀胷膈痞悶飲食遲化四肢困倦嘔吐惡心常服升降滯氣消化宿食去痰進飲食木香枳殻炒去瓤㯽榔半夏湯泡七次青皮去瓤陳皮去白白茯苓去皮各一兩白术煨一兩半京三稜煨廣茂煨各三兩三錢黑牽牛微炒取末三兩人參神麴微炒大麥糵微炒枳實炒各半兩乾薑炒七錢右各為末水糊為丸如梧桐子大每服五十丸食後薑湯送下木香枳殻丸寛胷膈進飲食消食快氣木香㯽榔陳皮去白黄連去鬚廣茂煨當歸去蘆枳殻去瓤麩炒青皮各半兩黄檗香附子麩炒去毛各一兩牽牛頭末二兩右為細末滴水為丸如梧桐子大每服五七十丸食後薑湯送下若有瘡毒急服百丸至二百丸㸔人虚實加減服但利五七行立消腫毒勝紅丸治心腹痞滿消食快氣美進飲食三稜醋炙廣茂醋炙青皮去瓤炒陳皮去白乾薑炮良薑枳實去瓤炒白术煨蘿蔔子炒别研各一兩香附子炒去毛二兩右為細末醋糊為丸如梧桐子大每服五七十丸薑湯或木香湯陳皮湯下不拘時候木香丸治酒食過傷停飲消積寛胸膈快脾胃丁香乳香研木香麝香研安息香研沉香鎊藿香各二錢半青橘皮去瓤陳皮去白㯽榔麫裹煨訶子皮京三稜畧煨蓬莪蒁煨肉豆蔲麫裹煨一兩桂二兩半去皮豬牙皂角一兩去皮弦巴豆七錢去殻不去油别研入細墨半兩右用陳米四兩與皂角墨巴豆同炒令焦黄用重紙裹候冷同前藥碾為細末白麫糊為丸如黄米榖大毎服五七丸至十丸食後薑湯送下如欲推利服十五丸利三二行勿多服松烟餅子治積氣塊消食快氣御藥院方有䖟蟲一分無牽牛大黄麥糵細墨五分燒研陳皮五錢去白牽牛取頭末五錢别碾神麴炒三稜火煨宻陀僧研五靈脂研碙砂研牡礪火煆麥糵各五錢大黄一兩北棗一十四箇燒存性斑猫去翅足一兩糯米同炒芫花醋浸一宿炒乾漆炒去烟白丁香研大㦸去蘆青礞石研蓬莪术煨各一錢巴豆一兩去皮濕紙包燒黄色為度右為細末打麫糊為丸如皂角子大捻為餅子臨用為粗末記以所傷煎湯送下或麫湯亦可小兒三餅大人㸔禀氣虚實加四五餅其積塊漸漸近下再進一服又覺近下或積氣疵血痞塞大人小兒久痢或休息痢并男子婦人年深不伏水土及暑月變成惡痢米物不消五痞塊逆格胃吐食心胷悶閉酒疸食黄勞𠻳上喘嘔逆涎沫心閉驚恐口苦惡心小便淋澁大便不通傷寒餘毒婦人胎前産後敗血結成積塊飲食平常遍身疼痛腰强腿硬手足眩厥九種心疼十般積熱九般水氣霍亂吐瀉久病瘦弱但有此證並皆治之勞傷沉麝香茸丸治五癆百損諸虚精怯元氣不固沉香二錢麝香一錢南木香乳香各三錢八角茴香四錢炒小茴香四錢炒鹿茸酥炙蓮肉炒各半兩晩蠶沙肉蓯蓉兎絲子牛膝川練子酒浸各半兩地龍去土淨半兩陳皮半兩去白仙靈皮三錢酥炙右為細末酒糊入麝香為丸如梧桐子大每朝不見紅日面東用温酒送下三十丸忌食羊血豆粉之物萬安丸川練子半斤微炒出汗知母半斤微炒出汗甘草四兩微炒茴香四兩炒黄色蓮子心木香各一兩晩蠶沙一兩微炒右將甘草茴香二味先搗為末以四兩熬膏外將餘四兩與其餘藥同為末用膏為丸如梧桐子大每服七八十丸空心温酒送下聚寶丹治五勞七傷諸虚不足温中正氣祛風活血逐寒除濕填精益髓强隂壯陽聰耳明目開心益智暖胃化食消痰寛中殺九蟲通七竅補五臓祕精氣止夢遺除欬嗽養肌膚治腰膝疼痛白茯苓去皮山茱茰去核五味子乾山藥石蓮肉雞豆肉金櫻子巴㦸去心破故紙炒杜仲去粗皮炒斷絲牛膝酒浸熟地黄酒浸焙石菖蒲逺志去心枸杞子酒浸焙龍骨楮實茴香炒仙茅肉蓯蓉酒浸焙乾沉香各一兩右為細末棗肉為丸如梧桐子大每服五十丸以硃砂為衣空心温酒鹽湯送下如有氣滯不順用木香調氣散入鹽少許湯調送下金鎻正元丹治男子五勞七傷沉寒痼冷四肢厥逆隂盛身寒臍腹久痛臓腑軟弱困倦少力飲食遲化澀精補氣久服强健駐顔白僵蠶炒破故紙炒白龍骨山茱茰湯浸去核桑螵蛸炒黑附子炮肉蓯蓉酒浸牛膝酒浸兎絲子酒浸各半兩韭子二兩炒右為細末煉蜜為丸如梧桐子大每服二三十丸空心温酒送下日進二服常服有益婦人亦可服神應丸治男子婦人五勞七傷大黄六兩去皮凈黄連四兩淨血竭三兩犀角末二兩仙人葢一箇醋炙黄色九肋鱉甲牛黄二錢靈礬二兩右為末用好醋一斗入砂鍋内文武火熬醋盡焙乾再為極細末酒糊為丸如彈子大每服一丸服藥須要除破日面東男子用酒將藥化開空心温服婦人用紅花好酒一盞半煎至七分去紅花滓將藥化開面東空心服之服藥後十日内忌生冷酒肉麫等物遺濁鎻精丸治精滑不禁川獨活川續斷榖精草石蓮肉去殻生雞豆去殻蓮心乾菱米川練子酥炒金櫻子𦂳龍骨五色白茯苓木豬苓小茴香藕節右各等分為細末鷄清為丸如梧桐子大每服四五十丸空心鹽湯送下乾物壓之辰砂妙香散治夢中遺精每服一匕虚者温酒調熱者麥門冬去心濃煎湯調方缺芡實丸治思慮傷心小便赤澀遺精白濁方缺通治還少丹治心腎俱虚漏精白濁山藥炮牛膝去苗酒浸焙山茱茰水洗去核白茯苓舶上茴香炒各一兩半兎絲子酒浸焙研續斷去蘆各一兩右為末煉宻丸如梧桐子大每服三十丸鹽湯下分清飲通心氣補漏精治小便餘瀝并赤白濁益智川萆薢石菖蒲鹽炒天台烏藥右等分剉為散入鹽少許煎空心服瑞竹堂經騐方卷一
