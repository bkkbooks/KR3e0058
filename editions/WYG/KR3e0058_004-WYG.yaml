body:
  text: 瑞竹堂經驗方卷二元沙圗穆蘇編喘𠻳秘痰丸治風痰喘𠻳人參木香天麻白术煨茯苓青皮去瓤陳皮去白各一兩槐角子半夏各七錢半豬牙皂角去皮弦酥炙五錢右為細末生薑自然汁打糊為丸如梧桐子大每服五七十丸食後臨卧温酒送下薑湯亦可僵蚕湯治喘𠻳喉中如鋸不能睡卧好末茶一兩白僵蚕一兩右為細末放碗内傾沸湯一小盞用盞葢定臨卧再添湯㸃服痰飲化痰丸快脾順氣化痰消食半夏洗南星去皮膜白礬皂角切碎生薑右各一斤用水同煮至南星無白㸃為度揀去皂角不用將生薑切片同半夏南星晒乾無日色火焙再加青皮去瓤陳皮去白紫蘇子炒蘿蔔子炒别研杏仁去皮尖炒另研乾葛神麯炒麥糵炒糖毬子香附子炒去毛右加藥共半斤與前藥合和一處碾為細末生薑自然汁浸蒸餅打糊為丸如梧桐子大每服五七十丸臨睡食後茶酒送下神仙墜痰丸治痰壅胷痞氣湊史府判驗黑牽牛一斤取頭末四兩皂角無虫蛀者去皮弦酥炙黄色去子凈一兩六錢生白礬一兩二錢右為細末清水為丸如梧桐子大毎服三五十丸漸加至百丸空心温酒送下㸔病輕重五日十日一服病輕者半月一月一服久服永無癱瘓之疾滌痰丸治男子婦人逺年日久積聚痰涎或飲酒食後吐唾日久面黄肌瘦皮肉枯澀眼無神光又治偏正頭風如一月服三五服至老無風癰之疾鎮江太平宣差傳好皂角不要虫蛀損者一十兩水浸一宿去皮弦火炙黄色取凈末二兩五錢豬牙皂角一兩依皂角製法枳殻二兩五錢一兩半火炒一兩生用黑牽牛二兩末右用朴硝五錢井花水泡開不用滓末澄清硝水為丸如梧桐子大每服五十丸臨卧用井花水送下量人虚實加減丸數服之敵痰丸治痰盛寛胸膈快氣完顔府判傳黑牽牛三兩皂角二兩去皮弦火中微燒白礬枯一兩半夏麯炒一兩陳皮去白一兩右為細末煮蘿蔔為丸如梧桐子大每服四五十丸臨卧淡薑湯送下化痰丸治頑痰不化石青一兩水飛石緑半兩水飛右為末麫糊為丸如菉豆大毎服十丸温湯下有痰即吐去一二椀不損人生胃丸治脾胃不足痰多嘔逆不思飲食此藥以南星粟米黄土為主葢為南星醒脾去痰粟養胃黄土取其以土養土性味温平美進飲食化痰之要劑真良方也大天南星四兩用真黄土半斤將生薑滓和黄土成劑包裹南星慢火煨香透去土將南星切碎焙乾丁香木香厚朴去皮薑製炒神麴炒麥糵炒橘紅白豆蔲仁縮砂仁青皮去白各一兩半夏麴二兩人參半兩沉香鎊半兩粟米一升用生薑二升和皮擂碎取自然汁浸粟米蒸焙甘草半兩炙右為細末法丸如菉豆大每服七十丸不拘時薑湯送下四妙丸治脾胃虚弱脾土不能化痰成窠斗停於胸臆飲食既少復遲當以實脾土則痰下氣順肉豆蔲一兩用鹽酒浸破故紙同炒乾燥不用故紙山藥一兩酒浸北五味子同炒乾燥不用五味子厚朴二兩去粗皮青鹽一兩同炒青鹽不見烟為度不用鹽大半夏一兩每箇切作二塊木豬苓亦作片水浸炒燥不用豬苓右為細末酒糊為丸如梧桐子大辰砂一分沉香一分作二次上為衣隂乾每服五七十丸空心鹽酒或米飲或鹽湯送下四製蒼术丸燥脾土固真養胃蒼术一斤分作四分製一分用破故紙小茴香同炒一分用川棟子同炒一分用川椒同炒一分用青鹽同炒右同炒畢餘藥不用止用蒼术為末酒糊為丸如梧桐子大毎服五十丸空心米飲送下寛中祛痰丸治男子婦人飲食過多色慾太過食喜酸醎作成痰飲於胷膈滿則嘔逆惡心流則臂膊大痛升則頭目昏眩降則腰脚重痛輕則左癱右瘓重則猛然倒地此藥寛中理氣祛痰搜風半夏四兩湯泡七次晒碾為末用生薑自然汁揑作餅子隂乾荆芥穗一兩白礬枯一兩麻黄四兩去節凈硃砂一兩研細水飛過一半入藥一半為衣槐角子一兩麩炒陳皮湯洗去白一兩右為細末生薑自然汁打糊為丸如梧桐子大每服三十丸空心臨卧用皂角子仁炒黄同生薑煎湯送下忌食豬羊血豬肉桑鵝蔴菇黄𤓰茄子等物反胃丁香散治反胃吐食水不能停黒錫一錢半又名黒鉛水銀一錢半二件合於慢火上焙為細末丁香三錢官桂一錢舶上硫黄五錢右為細末用小黄米湯及生薑自然汁三錢調每空心服三錢千轉丹治反胃吐食等病牛涎半斤好蜜半斤木鼈子三十個去皮油為末右合放於銀器内慢火熬用槐條七枝攪之煨乾為度每和白粥兩匙日進三服急救仙方專治反胃反胃之病十有九死非藥不效良因輙强以食先飲以羮湯是速其吐今得其説不强以食絶其羮湯先投來復丹暑藥知其非伏暑証遂投養正靈砂之類飢則以飯炒香乾啖之不與一㸃湯水三日後竟不復吐飲食如初再治方用又方甘蔗𢷬汁七升生薑𢷬汁一升打和分作三服又方棗子一箇去核裹全斑猫一箇用文武火煨畢去猫用棗空心服之白湯送下九仙餅治反胃人參南木香不見火南星薑汁洗七次各二錢甘草錢半夏薑汁洗七次五錢枳殻去瓤麫炒白礬明凈者火枯豆豉煆過各八錢重厚朴薑汁浸炒乾五錢重右等分製為細末候夜間晴時露過以人參厚朴煎湯糊作餅子小平錢大慢火焙乾每服一餅用薑一大塊切作兩片夾餅子藥用紙裹浸濕慢火煨熟連薑及餅子嚼碎以真料平胃散調湯吞下切忌諸般冷物生物仍令病者寛心開懐服藥調理方見效濕氣蒼术散治風濕常服壯筋骨健歩蒼术一斤用粟米泔浸過竹刀刮去皮半斤童子小便浸半斤無灰好酒浸右春五日夏三日秋七日冬十日取出蒼术於凈地上撅一坑以炭火煆紅去炭將蒼术及酒小便同傾坑内瓦器葢覆用泥封固經一宿取出蒼术為細末每服一錢空心鹽湯或酒調下常服除濕壯筋骨明目黑弩箭丸治風濕證兩頭尖五靈脂各一兩沒藥另研當歸乳香研各三錢右為細末醋糊為丸如梧桐子大每服一十丸至五十丸臨卧温酒下忌油膩濕麫孕婦勿服導水丸黄芩二兩去粗皮大黄二兩去粗皮酒浸二三時紙裹火煨黑牽牛一斤炒香取頭末四兩滑石四兩研細飛去灰石右為細末滴水為丸如梧桐子大每服五七十丸臨卧温水送下如加黄連薄荷葉川芎各二錢半即神芎丸也詳證加後藥甘遂一兩久雨則加除濕熱腰痛泄水濕腫白芥子一兩除遍身走疰疼痛朴硝退熱散腫止痛乆旱則加郁李仁散滯結通闗節行腸胃通滯樟栁根去腰腿沉重各一兩透骨膏治一切風濕走注疼痛生熟地黄馬鞭草各半斤吳茱茰白麫各三兩骨碎補敗薑屑各四兩即乾生薑鱉甲三斤炙蒲黄二兩右為細末用米醋調似膏子於火上温熱塗於痛處用紙裹著候藥冷再用熱􅂗如此七次於避風處用接骨丹逐濕氣定痛疼腫疾並皆治之骨碎補去毛一斤敗薑生地黄去土洗凈各一斤蒲黄半斤白麫二斤右為細末拌勻用隔年好米醋熬熱調藥敷於痛處如藥冷再用熱醋調敷如此七次用綿包之大有神效此一料分作七服七日用之如神散治風濕手臂痛左癱右瘓風氣等證真皂角去皮弦八兩海亦兒半兩即合孩兒香茶者是北􅀥四兩右先將皂角熬成清汁濾去滓將􅀥及海亦兒入磁器内用桑柴文武火熬至七分去海亦兒熬乾為度取棗藏於磁器每服兩三箇細嚼嚥下後飲酒一盞三四箇之上不得多喫木𤓰虎骨丸治風寒濕客於榮衛合而成痺使肢節疼痛麻痺不仁手臂無力頂背拘急脚膝筋攣不能屈伸宜常服木𤓰肉麒麟竭另研沒藥另研自然銅煆醋焠七次研木香虎脛骨酒炙黄楓香脂研敗龜板醋炙黄骨碎補去毛甜𤓰子真桂去粗皮當歸身剉焙各一兩乳香另研半兩地龍去土安息香湯酒煮入藥各二兩右為細末拌勻酒糊為丸如梧桐子大每服三十丸温酒送下煎木𤓰湯下亦可漸加至五十丸食前臨卧各進一服忌食冷物濕麫諸血等物聖靈丹治男子婦人風濕相搏氣痺傳於手足麻腫疼痛久則偏枯及脚氣不能行履大治癱瘓風濕手足復舊川烏生去皮臍切片草烏去皮尖切片鹽炒香熟去鹽各半兩麻黄去根節微炒去汗生地黄洗去苗剉碎酒浸一宿焙酥黄色自然銅醋淬七次研各一兩五靈脂揀去炒石微炒不得過虎脛骨醋浸炙酥黄色廣木香二錢半乳香另研沒藥炙研各錢半乾酸木𤓰生者八兩甜𤓰子炒黄色一兩沉香五錢鎊敗龜板卜卦者醋炙黄酥七錢半右為細末煉白沙蜜冷定和藥成劑每一兩分為一十二丸每服二丸隔夜以生薑自然汁入磁盞同浸至天明化開空心温酒調服再飲盞熱酒送下日進二服唇吻微麻無妨甜𤓰子丸治風濕相搏腰脚疼痛服之大效甜𤓰子凈二兩炒黄色乾木𤓰一兩半去皮瓤葳靈仙一兩川烏頭半兩炮去皮臍右為細末酒煑麫糊為丸如梧桐子大每服三十丸温酒下避風處少息汗出為度服藥後當日忌食熱物及相反藥材如半夏𤓰蔞貝母白芨之類若病在上食後服病在下食前服諸痛四倍丸治腰膝疼痛進美飲食杜仲四兩瓦器内炒黄色去絲破故紙四兩瓦器内炒黄色甘草四兩胡桃仁四兩去皮油右為細末酒糊為丸如梧桐子大每服五七十丸空心用甘草末調湯送下沒藥延胡散治男子婦人急心氣腹痛延胡索海帶各五錢沒藥四錢良薑三錢右為細末每服三錢温酒調服不拘時候復春丹治腰腿疼痛杜仲酥炒斷絲破故紙酒浸一宿用脂麻炒黄色萆薢酥炙黄巴㦸去心各一兩沉香五錢右為細末醋糊為丸如梧桐子大每服五七十丸空心服每服藥時先嚼胡桃一枚同藥温酒送下乾物壓之蒼术丸治腰腿疼痛明目暖水臓并小腸疝氣大有補益蒼术一斤用泔浸去皮切作片用生葱白一片切碎加鹽二兩同炒蒼术黄色為度去葱不用川椒微炒白茯苓去皮小茴香微炒各四兩右為細末酒糊為丸如梧桐子大每服五七十丸空心温酒送下徐神翁神效地仙方治筋骨疼痛打撲損傷仙术湯送下除寒濕進飲食川烏一箇去尖草烏五箇去尖荆芥去枝半兩蒼术一兩米泔浸一宿炒自然銅一字研白芷地龍沒藥各半兩研乳香半錢研萵苣種黄𤓰種梢𤓰種木鼈子各一錢半兩錢二文右為細末醋糊為丸如梧桐子大每服一十丸食後温酒送下鐵刷湯治男子婦人一切隂寒失精色敗腰胯疼痛隂汗不止腸風下血有痔即散有漏平痊兼治婦人赤白帶下産後血暈氣䓁疾用酸漿水一大椀藥末五錢鹽少許同煎三五十沸傾在盆内熏之漸通手洗浴如火熱婦人每日熏浴之使精穢血如黑汁下用藥人自知紫梢花成塊帶蒂者佳肉桂大丁香蛇床子吳茱茰各一兩山茱茰去核天仙子蘿蔔子川椒細辛狗􅆃地豆大者白眉者佳芎藭甘松各半兩天雄二箇白檀槐角子白芷沉香芸臺子葶藶子香附子芫花巴㦸去心肉蓯蓉木香各二錢右為粗末每煎熏洗脚氣治風濕脚氣好川烏一兩生用無名異二兩研石亭指一兩生用研右為細末用葱白搗爛紐自然汁為丸如梧桐子大每服只一錢重空心生薑淡茶吞下一日一服敷藥草烏白芷防風獨活羌活右等分為細末用生地龍數條研爛酸米醋調敷飛歩丸治隂陽風濕脚氣手臂舉動不起無問逺近並皆治之紫金皮二斤取頭末八兩揀時嚼似腦子味透頂者方佳又名滑藤根五加皮二兩五錢焙乾肥川烏二兩五錢去皮生用蒼术二兩五錢米泔水浸一宿焙乾木鼈子仁四兩竹刀切片用三年米酸浸三宿其油已去焙乾右為細末醋糊為丸如兩魚眼睛大每服三十至五十丸空心用鹽木𤓰少許細嚼和藥無灰酒送下忌動風物復春丸治腰脚風濕勞損手足麻痺筋骨疼痛不能屈伸活血注顔補虚萆薢四兩破故紙炒杜仲炒去絲胡蘆芭炒木通各二兩骨碎補去毛虎骨酥炙乳香研㯽榔沒藥木香各一兩半甜𤓰子炒三兩牛膝去蘆酒浸焙乾巴㦸去心各二兩胡桃仁一百個去皮另研極細黑附子一兩炮右為細末再與胡桃仁同研極細酒糊為丸如梧桐子大每服四五十丸食前温酒送下騙馬丹治寒濕脚氣四肢疼痛補五臓壮筋骨補精髓駐顔黑髮鬢健行歩大宜常服胡蘆芭鹽炒黄色破故紙鹽炒香金剛骨酒浸一宿晒鹽炒骨碎補去毛鹽炒甜𤓰子鹽炒黄色胡桃仁另研細各一兩乳香另研沒葯另研自然銅火煨醋蘸七次各半兩右除另研外共為細末醋糊為丸如梧桐子大每服三十丸温酒送下病在上食後病在下食前日進三服五加皮丸治男子婦人脚氣骨節皮膚腫濕疼痛進飲食行有力不忘事五加皮四兩酒浸春秋三日夏二日冬四日逺志去心四兩春秋三日夏二日冬四日用酒浸令透易為剥皮右曝乾為末春秋冬用浸藥酒為糊夏别用酒為糊丸如梧桐子大每服四五十丸空心温酒送下疝香蝎散治小腸疝氣隂囊腫痛乳香一錢蝎蛸一錢川烏頭去皮生用三錢右為細末每服一錢水一盞煎至七分入鹽少許空心連滓熱服立見效煑裩藥山茱茰吳茱茰蛇床子牡蠣川椒葱白帶鬚者右各等分㕮咀每用三錢熬水熏洗又玉蟾裩詩曰三嵗嬰孩性不調休教二子放疎嬌一張衲被幪頭了自有神仙路一條川練茴香散治小腸疝氣疼痛木香茴香鹽炒香不用鹽川練子切片鹽炒同鹽用右各等分為細末每服三錢熱酒一盞空心調服神效丸治疝氣奔豚嬰核并附祕訣芫花半兩醋浸炒木香㯽榔三稜炒各半兩茯苓青皮全蝎附子炮􅔈砂研末桂各二錢半右將碙砂用水浸磁盞内去滓留湯以瓶頓成膏子米醋打糊為丸如菉豆大每服三十丸空心温酒送下秘訣云疝氣因何得邪風在腎經流傳並血聚如此漸成形冷氣結在臟因兹小腹疼本經無補法疎利藥通靈喝氣丸治小腸氣及腰痛萆薢杜仲酥炒去絲葫蘆巴生脂蔴炒拌炒過去脂蔴破故紙炒小茴香鹽水浸一宿各一兩胡桃仁二兩湯去皮右將胡桃為末同前五味藥末為丸如梧桐子大每服三五十丸空心鹽酒送下或鹽湯亦可飛黄丹治小腸疝氣疼痛用帶毛雀兒取去腸肚將金絲礬研細裝放雀兒肚滿縫合用桑柴火緩緩煨燒成炭研為細末空心用無灰酒調下恐惡心入鹽湯少許年逺者每服二枚近者一枚累有效驗木香練子散治小腸疝氣膀胱偏墜乆患藥不效者服此其效如神川練子三十箇為末未碾前先用巴豆二十粒同練子炒黄赤色去巴豆不用萆薢半兩石菖蒲二兩炒青木香一兩炒荔枝核二十箇炒右為細末每服二錢重入麝香少許空心炒茴香鹽酒調下通氣散治小腸疝氣腰腹牽引疼痛及感風寒或因勞動腰痛并治婦人吹妳心氣脾痛瘡癤已潰未潰悉治有功穿山甲剉細用蛤粉炒脹去粉二兩重白牽牛一兩炒延胡索去皮一兩陳皮去白淨一兩炒木香一兩半不見火舶上硫黄二兩炒厚朴去皮一兩甘草一兩炙黑牽牛半兩炒右為細末每服二錢空心温酒調下病在上者食後木賊散治小腸疝氣木賊不計多少去節先將鍋子燒熱取離火炒右碾為細末空心熱酒調下香沙丸茴香鹽炒香去鹽不用新蠶沙晒乾右等分為細末煉蜜為丸如弹子大空心細嚼温酒送下甚者日進二服安息香丸治隂氣下墜腫脹卵核偏大堅硬如石痛不能忍者延胡索微炒海藻洗昆布洗青皮去白茴香炒川練子去核馬蘭花炒各一兩木香半兩不見火大㦸酒浸三宿切片焙乾二錢半右為細末用酒醋各一盞入碙砂真阿魏真安息香各二錢半淘去沙石再用酒醋各一盞熬成膏入細研麝香一錢沒藥二錢半拌勻前藥丸如菉豆大每服一十丸至十五丸空心用綿子灰調酒送下淋淋澀諸般沙石者琥珀二錢明者研細右為細末空心用葱白濃煎湯調服無問諸般淋證一二服立效絳宫湯治三焦氣滯腹脇主痛因服熱藥引入下焦膀胱受熱小便淋澀臍下脹痛露蜂房血餘各三兩白茅根五錢右為細末入生麝香少許每服二錢食前温酒下淋止不須服甚者不過三五服有效泄紅豆丸治臓腑泄㵼名為飱泄麥糵炒半夏湯泡七次縮砂仁神麯各一兩半炒碙砂醋化甘草青皮去瓤陳皮去白鬱金紅豆藿香棠毬蓬术各一兩煨良薑蓽茇各二兩丁香半兩不見火右為細末水煮麫糊為丸如梧桐子大每服一百丸米飲或隨物空心下病甚者日進三服建中丸治脾胃氣弱胃犯風冷腹痛腸鳴泄㵼經云食畢而中謂之洞泄手足冷面色青白下部虚寒中滿氣短常服寛中建脾養胃育真固氣大附子炮去皮臍大川烏炮去皮臍桂心胡椒蓽茇乾薑良薑炒吳茱萸去核湯泡右各等分為細末醋糊為丸如梧桐子大每服五七十丸空心食前米飲下蠱香棗丸治蠱氣病蠱有十種苦丁香右為細末用熟棗肉為丸如梧桐子大每服三十九丸煎棗湯送下空心服之立效三服必愈瑞竹堂經騐方卷二
