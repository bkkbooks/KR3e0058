body:
  text: 原序人有恒言㸔方三年無病可治治病三年無藥可療斯言何謂也謂病之有方不難而方之有驗為難也盱江郡侯厯任風憲民社愛人一念隨遇而見有仁心有仁聞人之被其恵澤者奚翅百千萬而涖官餘暇猶注意於醫藥方書之事每思究病之所由起審藥之所宜用或王公貴人之家或隠逸髙人之手所授異方率和劑三因易簡等書之未載遇有得必謹藏之遇有疾必謹試之屢試屢驗積久彌富守盱之日進一二醫流相與訂正題曰瑞竹堂經驗方爰鋟諸木以愽其施一皆愛人之仁所寓也既仁之以善政復仁之以善藥孰有能如侯之仁者哉噫世之醫方甚繁用之輙效者葢鮮今之所輯悉已經驗則非其他方書所可同也侯者沙圗穆蘇瑞竹堂者徃時侯挿竹為樊竹再生根遂生枝葉人以為瑞而侯以扁其堂云吳澂序
