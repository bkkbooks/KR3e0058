  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0058_WYG_005-1a, image: WYG0746/WYG0746-0023a.png}
body:
  text: 瑞竹堂經騐方卷三元沙圗穆蘇編眼大全寳光􅄆治逺年近日風弦爛眼除昏退翳止淚截赤定痛黄連半斤去鬚當歸一兩􅅋仁一兩六錢去皮油生白礬二兩二錢甘草二兩三分杏仁二兩四錢去皮尖草龍膽四兩八分乾薑二兩四分赤芍藥三兩三錢右用骨刀子剉細秫米大不擣每用二錢水一大盞煎數沸去滓熱洗治逺年風眼杏仁三十一箇去尖分作三分粉草一寸分作三分潄口凈將杏仁一分甘草一分同嚼爛如泥吐於磁盞内三分俱如此再將銅緑二錢研為極細末與前葯和勻用新汲井水一盞將水潄口吐於葯内如法攪勻以帛濾過澄清於眼大角㸃之立效勿令塵坐於葯内治近年之眼銅緑研寒水石研右各等分碾為細末用五七沸滚水浸葯攪勻澄清將水靣葯膜掠去將清葯水於眼大角㸃之勿令塵坐於葯内立效截惡眼立效方好明礬如黒豆大一塊山梔子一箇去皮右為粗末絹帛包定用井花水半小盞浸之候水浸透水黄洗眼三二十次一宿次早即效撥雲膏治男子婦人諸般眼患不問年逺日近黄丹四兩細研水飛爐甘石四兩用童子小便煆淬五七次研細黄連水飛五七次青鹽碙砂乳香䧺黄黄連枯白礬輕粉甘草蜜陀僧麝香龍腦當歸白丁香各半錢硃砂三錢没葯海螵蛸研去甲各二錢右各如法研細用白沙蜜一十五兩慢火熬初沸下黄丹二沸下爐甘石三沸下諸葯末不粘手為度貯甆盞内熱水泡開熱㸃眼不拘時候靈光還精膏治一切眼疾川黄連四兩剉如大豆用童子小便浸一宿漉去滓晒乾為末爐甘石六兩放錢片上炭火内燒紅透黄連汁淬之燒淬七次研為末黄丹三兩研細水飛凈當歸三錢烏魚骨白丁香碙砂另研輕粉各一錢研麝香另研乳香另研各半錢右件為細末用白沙蜜一十兩銀噐内或砂鍋内先熬五七沸以凈紙搭去靣上蠟取凈除黄丹外下餘葯用濕栁幹子攪勻次下黄丹再攪勻於慢火内徐徐攪至紫色不粘手為度急丸如皂角子大以紙裹之每用一丸新汲水於小盞内化開時時洗之其效不可盡述黄連膏治一切眼疾刁提領傳得效方黄連十兩去鬚蕤仁三錢去殻研杏仁七十箇湯去皮尖木賊七錢去節草龍膽二兩去土右葯用水一斗浸之春秋三日夏二日冬五日入鍋内熬至半升濾出再用水七升熬至小半升濾出再用水五升熬至不到半升濾出再用重絹濾過同熬至半升傾於椀内重湯煑為膏貯於甆噐内每用米粒大於盞内用水一滴濃化開以􅁫頭㸃之三五遍口内覺苦立效乳香當歸􅄆治内障眼傷風傷寒攀睛瘀肉多年眼中倒睫拳毛鳯凰臺當歸薄荷葉荆芥穗藁本榖精草石膏煆没藥研白葛根兎絲子淘去沙酒蒸蔓荆子自然銅火煆醋碎七次研苦丁香漢防已川芎赤小豆乳香研九節菖蒲去毛炒香白芷火龍𤓰鬱金各一錢䧺黄研定風子細辛各一錢半右為極細末每日三次早晨午時臨卧鼻内搐之海青膏㸃眼一切昏翳内障眼疾黄丹四兩水飛訶子八箇去核為細末烏魚骨白者二錢青鹽一兩另研白沙蜜凈者一斤右將蜜滚去白沫先下黄丹用槐條四十九根少時下餘藥不住手一順攪直攪蜜紫色滴水中不􅄆為度後再用黄連二兩為末水三大椀於熬藥鍋内熬數沸將鍋并槐條上藥洗凈别用甆噐收之澄清専洗風赤冷淚等眼前所熬膏子藥用㸃雲翳白膜等疾昔人曽以此藥専以救人夜光丸治腎虚血弱風毒上攻眼目視物昏花不明久而漸變内障常服降心火益腎水明目除暗夜可讀細字天門冬去心焙麥門冬去心焙生地黄懐州道地熟地黄懐州道地新羅参去蘆白茯苓去黒皮乾山藥各一兩枸杞子揀凈牛膝酒浸另搗金􅁫石斛酒浸焙乾另搗草决明炒杏仁去皮尖炒甘菊揀凈兎絲子酒浸焙乾另搗羚羊角鎊各七錢半肉蓯蓉酒浸焙乾另搗五味子炒防風去蘆甘草炙赤色剉沙苑蒺藜炒黄連去鬚枳殻去瓤麩炒川芎生烏犀鎊青箱子各半兩右除另搗外同為極細末煉蜜為丸如梧桐子大每服三十五丸空心温酒送下鹽湯亦可青黛􅄆治眼倒睫極效蝟刺􅀥樹上黄直棘針香白芷青黛研右各等分為細末左眼倒睫口噙水左鼻内㗜之右眼倒睫右鼻㗜之耳治耳聾用蒼术一塊長七分將一頭削尖一頭截平將尖頭挿於耳内於平頭上安筋頭大艾炷灸之聾輕者灸七炷聾重者灸一十四炷覺耳内有熱氣者効鼻㯽榔􅄆治鼻頭鷄心㯽榔舶上硫黄各等分片腦少許右為細末用絹帛包裹時時於鼻上搽磨鼻聞其臭即效又加箆麻子肉為末酥油調臨睡少搽於鼻上終夜得聞又方枇杷葉一兩去毛隂乾新者佳梔子半兩右為細末每服二三錢温酒調下早辰服先去左邊臨卧服去右邊效如神齒追風􅄆治諸般牙疼貫衆鶴虱荆芥穗各等分右㕮咀每服二錢加川椒五十粒用水一椀煎至七分去滓熱潄吐去藥立效風牙痛徳生堂作細辛􅄆草烏頭極好者細辛去葉等分右為細末先以冷水潄凈用手指㸃藥擦牙李憲徳生堂方吐去涎三次即止藥不可嚥下須臾立愈蟲牙疼天仙子不計多少燒烟用竹筒抵牙引烟熏之其蟲即死永不發神仙長春􅄆治牙齒動摇疼痛牢牙黒髭髪至老不白深有神效太平宣差傳徳生堂方兼治牙齦牙宣但無香附子皂角一斤去皮弦虫蛀不用食鹽四兩二味同燒煉香附子凈四兩炒去毛青鹽四兩研牛蒡子四兩炒蓮花蕊一兩藿香一兩旱蓮草一兩麝香一分研腦子一分研右將皂角剉碎用小瓦盆兩箇上盆底鑚小孔三箇下盆裝一重皂角一重食鹽四兩都裝盆内相合泥固炭火煆煉烟青為度取出與前藥碾細入麝香腦子同為細末每日早晨臨睡刷牙甚妙沉香􅄆治刷牙固齒榮飬髭髪沉香二錢半鎊白檀一錢半鎊苦練子破四片炒半斤母丁香一錢半細辛去苗半兩酸石榴皮二錢半當歸半兩訶子皮二錢半香附子半兩炒去毛荷葉灰一錢青鹽二錢半研青黛二錢半研乳香一錢研龍腦半錢研麝香半錢研右為細末每用半錢如常刷牙温水潄了早晩二次用蒺藜􅄆治打動牙齒蒺藜根右燒灰貼動牙即牢刷牙藥香附子炒去毛一兩大黄火煨右用橡子二十箇内一十八箇裝滿青鹽於沙噐内單擺定用碗盖之燒存性與生橡子二箇并香附子大黄同為細末每日刷牙掠髭鬢脣治蠒脣方黄蘖一兩五倍子二錢蜜陀僧少許甘草少許右除黄蘖外為細末水調勻敷於黄蘖上火炙三五次炙盡藥末為度將黄蘖切成薄片臨睡貼之天明即愈靣洗靣藥零陵香檀香鎊丁香茅香藿香白术白芨白斂川芎沙参防風藁本三柰子天花粉木賊甘松桃仁兒黒牽牛白僵蠶炒去絲香白芷各一兩緑豆五升沸湯泡一宿晒乾肥皁角五十筴去皮弦右為細末每日洗而用之治靣上遊風諸般熱毒風刺等證即令光澤精神髭髪五神還童丹堪嗟髭髪白如霜要黒原來有異方不用擦牙並染髪却來五味配隂陽赤石脂與川椒炒辰砂一味最為良茯神能飬心中血乳香分兩要相當􅀥肉為丸桐子大空心温酒十五雙十服之後君休摘管教華髪黒加光兼能明目并延壽老翁變作少年郎赤石脂川椒辰砂茯神乳香各一兩此方乃仙家𫝊授無問老少皆可服丁砂􅄆掠髭髪大訶子一箇母丁香一十五箇百藥煎一錢鍼砂少許醋炙七次髙茶末右為極細末用水一大碗熬數沸不去滓收於凈甆器内每夜臨卧温漿洗凈髭髪用藥水掠之次早用温漿水洗凈百日其髭髪自黒用藥更浸一新釘尤妙婦人亦可用妙應􅄆牢牙疎風理氣黒髭髪白茯苓遼参細辛去葉香附子炒去毛白蒺藜炒去角川芎縮砂各五錢龍骨研石膏煆百藥煎白芷各七錢麝香少許研右為細末臨卧早晨温水刷之訶子􅄆烏髭髪訶子兩箇去核没食子百藥煎三兩金絲礬一兩半研鍼砂三兩用好醋一碗甆器浸三日炒七次右將喬麥麵入鍼砂打糊先夜將鍼砂糊抹在頭上用荷葉包到天明温漿水洗凈次夜却將前四味藥末調入鍼砂用生薑一塊槌碎再加些少輕粉一處調勻抹在頭上用荷葉包到天明温漿水如數㸃清油在内洗凈其髪黒且光掠髭鬢方白檀末一錢香白芷一錢白芨一錢滑石研零陵香二錢三柰子三錢麫包燒熟為度青黛一錢研百藥煎一錢另研甘松一錢去土右為細末用漿水一大盞藥末一錢甆器收盛盖覆勿令灰塵坐落早晨梳洗畢掠之不過十數日有騐用盡再添漿水藥末瑞竹堂經騐方卷三
