body:
  text: 瑞竹堂經驗方卷三元沙圗穆蘇編眼大全寶光𣪚治逺年近日風弦爛眼除昏退翳止淚截赤定痛黃連半斤去鬚當歸一兩𬎼仁一兩六錢去皮油生白礬二兩二錢甘草二兩三分杏仁二兩四錢去皮尖草龍膽四兩八分乾薑二兩四分赤芍藥三兩三錢右用骨刀子銼細秫米大不搗每用二錢水一大盞煎數沸去滓熱洗治逺年風眼杏仁三十一箇去尖分作三分粉草一寸分作三分潄口淨將杏仁一分甘草一分同嚼爛如泥吐於磁盞內三分俱如此再將銅緑二錢研為極細末與前藥和勻用新汲井水一盞將水潄口吐於藥內如法攪勻以帛濾過澄清於眼大角點之立效勿令塵坐於藥內治近年之眼銅緑研寒水石研右各等分碾為細末用五七沸滚水浸藥攪勻澄清將水靣藥膜掠去將清藥水於眼大角點之勿令塵坐於藥內立效截惡眼立效方好明礬如黑豆大一塊山梔子一箇去皮右為粗末絹帛包定用井花水半小盞浸之候水浸透水黃洗眼三二十次一宿次早即效撥雲膏治男子婦人諸般眼患不問年逺日近黃丹四兩細研水飛爐甘石四兩用童子小便煆淬五七次研細黃連水飛五七次青鹽碙砂乳香雄黃黃連枯白礬輕粉甘草蜜陀僧麝香龍腦當歸白丁香各半錢硃砂三錢沒藥海螵蛸研去甲各二錢右各如法研細用白沙蜜一十五兩慢火熬初沸下黃丹二沸下爐甘石三沸下諸藥末不粘手為度貯瓷盞內熱水泡開熱點眼不拘時候靈光還精膏治一切眼疾川黃連四兩銼如大豆用童子小便浸一宿漉去滓晒乾為末爐甘石六兩放錢片上炭火內燒紅透黃連汁淬之燒淬七次研為末黃丹三兩研細水飛淨當歸三錢烏魚骨白丁香碙砂另研輕粉各一錢研麝香另研乳香另研各半錢右件為細末用白沙蜜一十兩銀器內或砂鍋內先熬五七沸以淨紙搭去靣上蠟取淨除黃丹外下餘藥用濕栁幹子攪勻次下黃丹再攪勻於慢火內徐徐攪至紫色不粘手為度急丸如皂角子大以紙裹之每用一丸新汲水於小盞內化開時時洗之其效不可盡述黃連膏治一切眼疾刁提領傳得效方黃連十兩去鬚蕤仁三錢去殼研杏仁七十箇湯去皮尖木賊七錢去節草龍膽二兩去土右藥用水一斗浸之春秋三日夏二日冬五日入鍋內熬至半升濾出再用水七升熬至小半升濾出再用水五升熬至不到半升濾出再用重絹濾過同熬至半升傾於碗內重湯煮為膏貯於瓷器內每用米粒大於盞內用水一滴濃化開以叉頭點之三五遍口內覺苦立效乳香當歸𣪚治內障眼傷風傷寒攀睛瘀肉多年眼中倒睫拳毛鳯凰臺當歸薄荷葉荆芥穗藁本榖精草石膏煆沒藥研白葛根兔絲子淘去沙酒蒸蔓荆子自然銅火煆醋碎七次研苦丁香漢防已川芎赤小豆乳香研九節菖蒲去毛炒香白芷火龍瓜鬱金各一錢雄黃研定風子細辛各一錢半右為極細末每日三次早晨午時臨卧鼻內搐之海青膏點眼一切昏翳內障眼疾黃丹四兩水飛訶子八箇去核為細末烏魚骨白者二錢青鹽一兩另研白沙蜜淨者一斤右將蜜滚去白沫先下黃丹用槐條四十九根少時下餘藥不住手一順攪直攪蜜紫色滴水中不𣪚為度後再用黃連二兩為末水三大碗於熬藥鍋內熬數沸將鍋并槐條上藥洗淨别用瓷器收之澄清専洗風赤冷淚等眼前所熬膏子藥用點雲翳白膜等疾昔人曽以此藥専以救人夜光丸治腎虛血弱風毒上攻眼目視物昏花不明久而漸變內障常服降心火益腎水明目除暗夜可讀細字天門冬去心焙麥門冬去心焙生地黃懷州道地熟地黃懷州道地新羅參去蘆白茯苓去黑皮乾山藥各一兩枸杞子揀淨牛膝酒浸另搗金叉石斛酒浸焙乾另搗草決明炒杏仁去皮尖炒甘菊揀淨兔絲子酒浸焙乾另搗羚羊角鎊各七錢半肉蓯蓉酒浸焙乾另搗五味子炒防風去蘆甘草炙赤色銼沙苑蒺藜炒黃連去鬚枳殼去瓤麩炒川芎生烏犀鎊青箱子各半兩右除另搗外同為極細末煉蜜為丸如梧桐子大每服三十五丸空心溫酒送下鹽湯亦可青黛𣪚治眼倒睫極效蝟刺棗樹上黃直棘針香白芷青黛研右各等分為細末左眼倒睫口噙水左鼻內嗅之右眼倒睫右鼻嗅之耳治耳聾用蒼术一塊長七分將一頭削尖一頭截平將尖頭插於耳內於平頭上安筋頭大艾炷灸之聾輕者灸七炷聾重者灸一十四炷覺耳內有熱氣者效鼻檳榔𣪚治鼻頭雞心檳榔舶上硫黃各等分片腦少許右為細末用絹帛包裹時時於鼻上搽磨鼻聞其臭即效又加箆麻子肉為末酥油調臨睡少搽於鼻上終夜得聞又方枇杷葉一兩去毛隂乾新者佳梔子半兩右為細末每服二三錢溫酒調下早辰服先去左邊臨卧服去右邊效如神齒追風𣪚治諸般牙疼貫衆鶴虱荆芥穗各等分右㕮咀每服二錢加川椒五十粒用水一碗煎至七分去滓熱潄吐去藥立效風牙痛德生堂作細辛𣪚草烏頭極好者細辛去葉等分右為細末先以冷水潄淨用手指點藥擦牙李憲德生堂方吐去涎三次即止藥不可咽下須臾立愈蟲牙疼天仙子不計多少燒煙用竹筒抵牙引煙熏之其蟲即死永不發神仙長春𣪚治牙齒動搖疼痛牢牙黑髭髮至老不白深有神效太平宣差傳德生堂方兼治牙齦牙宣但無香附子皂角一斤去皮弦蟲蛀不用食鹽四兩二味同燒煉香附子淨四兩炒去毛青鹽四兩研牛蒡子四兩炒蓮花蕊一兩藿香一兩旱蓮草一兩麝香一分研腦子一分研右將皂角銼碎用小瓦盆兩箇上盆底鑽小孔三箇下盆裝一重皂角一重食鹽四兩都裝盆內相合泥固炭火煆煉煙青為度取出與前藥碾細入麝香腦子同為細末每日早晨臨睡刷牙甚妙沉香𣪚治刷牙固齒榮飬髭髮沉香二錢半鎊白檀一錢半鎊苦練子破四片炒半斤母丁香一錢半細辛去苗半兩酸石榴皮二錢半當歸半兩訶子皮二錢半香附子半兩炒去毛荷葉灰一錢青鹽二錢半研青黛二錢半研乳香一錢研龍腦半錢研麝香半錢研右為細末每用半錢如常刷牙溫水潄了早晚二次用蒺藜𣪚治打動牙齒蒺藜根右燒灰貼動牙即牢刷牙藥香附子炒去毛一兩大黃火煨右用橡子二十箇內一十八箇裝滿青鹽於沙器內單擺定用碗蓋之燒存性與生橡子二箇并香附子大黃同為細末每日刷牙掠髭鬢脣治繭脣方黃蘖一兩五倍子二錢蜜陀僧少許甘草少許右除黃蘖外為細末水調勻敷於黃蘖上火炙三五次炙盡藥末為度將黃蘖切成薄片臨睡貼之天明即愈靣洗靣藥零陵香檀香鎊丁香茅香藿香白术白芨白斂川芎沙參防風藁本三奈子天花粉木賊甘松桃仁兒黑牽牛白僵蠶炒去絲香白芷各一兩緑豆五升沸湯泡一宿晒乾肥皂角五十策去皮弦右為細末每日洗而用之治靣上遊風諸般熱毒風刺等證即令光澤精神髭髮五神還童丹堪嗟髭髮白如霜要黑原來有異方不用擦牙並染髮却來五味配隂陽赤石脂與川椒炒辰砂一味最為良茯神能飬心中血乳香分兩要相當棗肉為丸桐子大空心溫酒十五雙十服之後君休摘管教華髮黑加光兼能明目并延壽老翁變作少年郎赤石脂川椒辰砂茯神乳香各一兩此方乃仙家傳授無問老少皆可服丁砂𣪚掠髭髮大訶子一箇母丁香一十五箇百藥煎一錢針砂少許醋炙七次髙茶末右為極細末用水一大碗熬數沸不去滓收於淨瓷器內每夜臨卧溫漿洗淨髭髮用藥水掠之次早用溫漿水洗淨百日其髭髮自黑用藥更浸一新釘尤妙婦人亦可用妙應𣪚牢牙疏風理氣黑髭髮白茯苓遼參細辛去葉香附子炒去毛白蒺藜炒去角川芎縮砂各五錢龍骨研石膏煆百藥煎白芷各七錢麝香少許研右為細末臨卧早晨溫水刷之訶子𣪚烏髭髮訶子兩箇去核沒食子百藥煎三兩金絲礬一兩半研針砂三兩用好醋一碗瓷器浸三日炒七次右將喬麥麵入針砂打糊先夜將針砂糊抹在頭上用荷葉包到天明溫漿水洗淨次夜却將前四味藥末調入針砂用生薑一塊槌碎再加些少輕粉一處調勻抹在頭上用荷葉包到天明溫漿水如數點清油在內洗淨其髮黑且光掠髭鬢方白檀末一錢香白芷一錢白芨一錢滑石研零陵香二錢三奈子三錢麵包燒熟為度青黛一錢研百藥煎一錢另研甘松一錢去土右為細末用漿水一大盞藥末一錢瓷器收盛蓋覆勿令灰塵坐落早晨梳洗畢掠之不過十數日有驗用盡再添漿水藥末瑞竹堂經驗方卷三
