body:
  text: 提要瑞竹堂經騐方五卷醫家類臣等謹案瑞竹堂經騐方五卷元沙圖穆蘓原作薩理彌實今改正撰沙圗穆蘇元史無𫝊其事蹟不可考以呉澂王都中二序核之則其字為謙齋嘗以御史出為建昌太守是書即其在郡時所撰集也原書本十五卷楊士竒等文淵閣書目載有一部一冊而晁瑮寶文堂書目内亦列其名則是明中葉以前原帙尙存其後遂尠𫝊本今據永樂大典所載搜採編輯計亡闕已十之五六而所存者尚多謹依方詮次分立二十四門釐為五卷中間如調補一門不輕用金石之藥其處方最為醇正又女科之八珍即四君子湯四物湯之併方其用尤廣明薛已醫案已詳著之至瘡科所載返魂丹與今世瘍醫所用梅花㸃舌丹奪命丹相類内托千金散以治癰毒亦見殊功是皆可資利濟之用惟幼科之褐丸子與蘇沈良方中所列褐丸名目相類治療亦同特彼用烏頭桂香附乾薑陳皮配合攻補兼行頗為周宻此乃用黒牽牛京三稜蓬莪术諸品殊病其過於峻利盖金元方劑往往如斯由北人氣禀壯實與南人異治故也此在於隨宜消息不可以成法拘矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6d0d6a673a6948a6ea052d0cbac2ee62cd82fe41cf0756e9398fa87cfa2d8b07
