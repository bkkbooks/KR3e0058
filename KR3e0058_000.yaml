body:
  text: 提要瑞竹堂經驗方五卷醫家類臣等謹案瑞竹堂經驗方五卷元沙圖穆蘇原作薩理彌實今改正撰沙圗穆蘇元史無𫝊其事蹟不可考以吳澄王都中二序核之則其字為謙齊嘗以御史出為建昌太守是書即其在郡時所撰集也原書本十五卷楊士竒等文淵閣書目載有一部一冊而朝瑮寶文堂書目內亦列其名則是明中葉以前原帙尚存其後遂鮮𫝊本今據永樂大典所載搜採編輯計亡闕已十之五六而所存者尚多謹依方詮次分立二十四門釐為五卷中間如調補一門不輕用金石之藥其處方最為醇正又女科之八珍即四君子湯四物湯之併方其用尤廣明薛已醫案已詳著之至瘡科所載返魂丹與今世瘍醫所用梅花㸃舌丹奪命丹相類內托千金散以治癰毒亦見殊功是皆可資利濟之用惟幼科之褐丸子與蘇沈良方中所列褐丸名目相類治療亦同特彼用烏頭桂香附乾薑陳皮配合攻補兼行頗為周密此乃用黑牽牛京三稜蓬莪术諸品殊病其過於峻利蓋金元方劑往往如斯由北人氣禀壯實與南人異治故也此在於隨宜消息不可以成法拘矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:42b3f4f929caab1f32ca29e9dad996ea7d04778dabdb8c98c5e8e84477105e85
