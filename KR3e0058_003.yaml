body:
  text: 瑞竹堂經驗方卷一元沙圗穆蘇編調補益榮丹治心脈結而散肺脈浮而軟餘脈如經原其所自思慮傷心憂慮傷肺心乃諸血之源肺為諸氣之候心虛則血少脈弱則氣虛遂致目澀口苦唇燥舌鹹甚則齒為之痛鼻為之不利怔忡白濁腠理不密易感風寒今以補氣湯補氣以養肺益榮丹滋血以助心榮衛日充心肺職治諸疾自愈當歸二兩去蘆酒浸焙紫石英火煆醋淬七次研細一兩柏子仁炒另研酸棗仁去殼小草木香不見火茯苓去木桑寄生卷柏葉酒炙熟地黃洗淨酒蒸焙龍齒各一兩另研辰砂半兩另研右為細末煉蜜為丸如梧桐子大辰砂為衣每服七十丸食前用麥門冬湯下補氣湯黃耆二兩去蘆密水炙人參甘草炙各半兩麥門冬一兩湯浸去心苦桔梗去蘆炒一兩右㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候補養丸補養元氣滋益氣血暖水臟及下元兔絲子洗淨搗末四兩破故紙炒香益智仁各一兩杜仲一兩去皮用生薑自然汁拌勻炒斷絲山藥一兩銼碎炒黃茴香一兩半炒香蒼术二兩米泔浸切片麵炒右為細末酒糊為丸如梧桐子大每服五十丸空心溫服鹽酒鹽湯任下杜仲丸補心腎益氣血暖元臟縮小便壯力蓮肉去心四兩龍骨七錢半新瓦上煆另研細益智仁破故紙炒香茴香各一兩微炒牛膝去苗一兩酒浸白茯神去皮木一兩杜仲去皮銼碎酒浸炒斷絲一兩兔絲子四兩桃仁湯炮去皮尖淨炒一兩右為細末用山藥四兩炙為末酒糊為丸如梧桐子大每服五十丸棗湯送下空心食前服如欲暖水藏減去蓮肉龍骨白茯神加好醋酒兼糟四兩蓮鬚蔥白四兩蒼术四兩米泔水浸一夕切片合蓮鬚蔥白酒糟搗淹一宿成餅曬乾炒令爇入前藥同研法製杏子杏仁一斤揀板杏真方用蒼术一斤白沙蜜二斤蒼术一兩去粗皮泔浸一宿麩炒半夏一兩薑汁浸一宿木香當歸人參各一兩右將杏仁用熱水洗淨頓於罐內將生蒼术一斤為粗末水熬一二百沸將汁浸杏仁封其口夏一日一夜春秋三日三夜冬五日五夜去蒼术及汁鍋內炒乾調入蜜半斤再炒少時取出將木香當歸人參半夏蒼术俱為細末拌於杏仁上冷定用磁罐盛頓再用生蜜半斤澆上每日空心細嚼三五十箇麵湯送下若氣不順加木香末一兩血不和加當歸末一兩若喘息加人參末一兩若婦人血氣不和加當歸服十寶丸補益肝脾腎三經其功不可具述破故紙酒浸一宿焙乾附子炮去皮臍蒼术銼泔浸一宿焙乾當歸去蘆焙各一兩石棗半兩去核枸杞子焙半兩兔絲子酒浸焙乾肉蓯蓉酒浸焙乾白茯苓去皮各半兩地黃去蘆揀肥壯者酒浸蒸久而透黑為度妙處全在此一味焙乾二兩右為細末醋糊為丸如梧桐子大每服三五十丸空心用溫酒或鹽湯送下乾物壓之坎離丸治心脾腎三經不足蒼术八兩銼如豆大泔浸三日或焙或晒乾分作四處一分用真烏豆一兩去皮臍切作片子又用川楝子淨肉一兩同蒼术炒焦黃色為度一分用川椒去目一兩又用陳皮一兩破故紙一兩酒浸一宿炒令乾次下蒼术川椒同炒黃一分用茴香淨一兩青鹽一兩半食鹽炒半兩先下蒼术炒熟次下茴香等同炒黃色一分用醇醲酒醋各一碗浸蒼术令自乾炒燥入後藥麥門冬去心三兩焙乾天門冬去心三錢焙茯神去皮木三分炒逺志去心三錢焙沉香一兩鹿茸燎去毛酥炙葫蘆芭酒浸炒川巴戟各五錢去心酒浸炒當歸半兩酒浸焙人參去蘆枸杞子雀腦川芎陳皮去瓤各半兩右為細末好酒煮神麴末二兩打糊為丸如梧桐子大每服四五十丸空心服如補心棗湯下補腎溫酒鹽湯下草還丹夫草還丹者不用金石不加燥熱不傷五臟只以草藥為用全在製度之妙得水火既濟之術奪丹砂燒煉之功大壯脾胃能進飲食且脾屬中央之土乃五臟之主一失調養則五臟俱虛百病由此而生此藥益精髓補腎經固元陽輕腰腳安五臟通九竅令人耳目聰明有一老人年七十以上常服此藥悅顔容烏髭髮固牙齒能夜書細字延年益夀乃仙家之良劑平補大有效驗蒼术四兩一兩酒浸一兩醋浸一兩泔浸一兩鹽水浸各一宿胡蘆芭一兩酒浸一宿破故紙一兩酒浸一宿覆盆子二錢揀淨茴香一錢新肥者川練子一兩木香半兩堅實者山藥堅白者穿山甲酥炙黃地龍去土淨茯苓堅圓者枸杞子牛膝各三錢酒浸一宿右晒乾為細末無灰酒糊為丸如梧桐子大每服三五十丸溫酒送下鹽湯亦可乾物壓之空心服畢須行百步使藥力行日進二服此方得之刑部令史王國寶渠𨽻事時有一僧子窩藏強盜部擬死渠入出之後僧子以此方謝囑云惟西平章有此方不可亂傳當珍藏之後渠入佐西平章於方册內得此方藥味分兩製度相同乃平章常服藥金鎖丹此藥延年益夀添精和血注顔壯骨養神調氣不可盡述逺志去心炒蛇床子酒浸微炒紫梢花鹿茸炒黃各一錢半海馬二對炒黃色黑牽牛取頭末三錢穿山甲五片炙黃木香乳香麝香各二錢半川茴香晚蠶蛾二錢續斷一錢半右為細末酒糊為丸如梧桐子大每服五十丸空心溫酒送下七日可便見效消導沉香降氣丸治胸膈痞滿升降水火調順隂陽和中益氣推陳致新進美飲食沉香鎊木香蓽澄茄枳殼去瓤縮砂仁白豆蔲仁青皮去白陳皮去白廣木炮枳實麩炒黃連去鬚半夏薑製蘿蔔子另研各半兩白茯苓去皮一兩香附子二兩炒去皮毛白术一兩煨烏藥一兩半右為細末生薑自然汁浸蒸餅為丸如梧桐子大每服五七十丸臨卧煎橘皮湯下薑湯亦可日進一服忌生冷丁香爛飯丸治中脘胃痛消食快氣丁香京三稜炮木香廣茂各一錢炮縮砂仁益智仁丁皮甘松去土各三錢甘草三錢炙香附子五錢炒去毛右為細末蒸餅水浸去皮為丸如梧桐子大每服三五十丸白湯送下細嚼亦可不拘時候香稜丸消食快氣寬中利膈化痰京三稜廣茂青皮陳皮各銼醋煮焙乾蘿蔔子炒另研縮砂仁白豆蔲仁沉香木香半夏麴各一兩炒神麴炒麥糵炒另研各一兩阿魏半兩另研香附子炒去毛烏藥枳殼麩炒去瓤蓽澄茄檳榔良薑各半兩右為細末以神麴麥糵阿魏末拌勻水和為丸如梧桐子大每服七八十丸薑湯下不拘時候木香枳殼丸治中焦氣澀胸膈痞悶飲食遲化四肢困倦嘔吐惡心常服升降滯氣消化宿食去痰進飲食木香枳殼炒去瓤檳榔半夏湯泡七次青皮去瓤陳皮去白白茯苓去皮各一兩白术煨一兩半京三稜煨廣茂煨各三兩三錢黑牽牛微炒取末三兩人參神麴微炒大麥糵微炒枳實炒各半兩乾薑炒七錢右各為末水糊為丸如梧桐子大每服五十丸食後薑湯送下木香枳殼丸寬胸膈進飲食消食快氣木香檳榔陳皮去白黃連去鬚廣茂煨當歸去蘆枳殼去瓤麩炒青皮各半兩黃檗香附子麩炒去毛各一兩牽牛頭末二兩右為細末滴水為丸如梧桐子大每服五七十丸食後薑湯送下若有瘡毒急服百丸至二百丸看人虛實加減服但利五七行立消腫毒勝紅丸治心腹痞滿消食快氣美進飲食三稜醋炙廣茂醋炙青皮去瓤炒陳皮去白乾薑炮良薑枳實去瓤炒白术煨蘿蔔子炒别研各一兩香附子炒去毛二兩右為細末醋糊為丸如梧桐子大每服五七十丸薑湯或木香湯陳皮湯下不拘時候木香丸治酒食過傷停飲消積寬胸膈快脾胃丁香乳香研木香麝香研安息香研沉香鎊藿香各二錢半青橘皮去瓤陳皮去白檳榔麵裹煨訶子皮京三稜略煨蓬莪蒁煨肉豆蔲麵裹煨一兩桂二兩半去皮豬牙皂角一兩去皮弦巴豆七錢去殼不去油别研入細墨半兩右用陳米四兩與皂角墨巴豆同炒令焦黃用重紙裹候冷同前藥碾為細末白麵糊為丸如黃米榖大每服五七丸至十丸食後薑湯送下如欲推利服十五丸利三二行勿多服松煙餅子治積氣塊消食快氣御藥院方有虻蟲一分無牽牛大黃麥糵細墨五分燒研陳皮五錢去白牽牛取頭末五錢别碾神麴炒三稜火煨密陀僧研五靈脂研碙砂研牡礪火煆麥糵各五錢大黃一兩北棗一十四箇燒存性斑貓去翅足一兩糯米同炒芫花醋浸一宿炒乾漆炒去煙白丁香研大戟去蘆青礞石研蓬莪术煨各一錢巴豆一兩去皮濕紙包燒黃色為度右為細末打麵糊為丸如皂角子大捻為餅子臨用為粗末記以所傷煎湯送下或麵湯亦可小兒三餅大人看稟氣虛實加四五餅其積塊漸漸近下再進一服又覺近下或積氣疵血痞塞大人小兒久痢或休息痢并男子婦人年深不伏水土及暑月變成惡痢米物不消五痞塊逆格胃吐食心胸悶閉酒疸食黃勞嗽上喘嘔逆涎沫心閉驚恐口苦惡心小便淋澀大便不通傷寒餘毒婦人胎前産後敗血結成積塊飲食平常遍身疼痛腰強腿硬手足眩厥九種心疼十般積熱九般水氣霍亂吐瀉久病瘦弱但有此證並皆治之勞傷沉麝香茸丸治五癆百損諸虛精怯元氣不固沉香二錢麝香一錢南木香乳香各三錢八角茴香四錢炒小茴香四錢炒鹿茸酥炙蓮肉炒各半兩晚蠶沙肉蓯蓉兔絲子牛膝川練子酒浸各半兩地龍去土淨半兩陳皮半兩去白仙靈皮三錢酥炙右為細末酒糊入麝香為丸如梧桐子大每朝不見紅日面東用溫酒送下三十丸忌食羊血豆粉之物萬安丸川練子半斤微炒出汗知母半斤微炒出汗甘草四兩微炒茴香四兩炒黃色蓮子心木香各一兩晚蠶沙一兩微炒右將甘草茴香二味先搗為末以四兩熬膏外將餘四兩與其餘藥同為末用膏為丸如梧桐子大每服七八十丸空心溫酒送下聚寶丹治五勞七傷諸虛不足溫中正氣祛風活血逐寒除濕填精益髓強隂壯陽聰耳明目開心益智暖胃化食消痰寬中殺九蟲通七竅補五臟祕精氣止夢遺除咳嗽養肌膚治腰膝疼痛白茯苓去皮山茱茰去核五味子乾山藥石蓮肉雞豆肉金櫻子巴戟去心破故紙炒杜仲去粗皮炒斷絲牛膝酒浸熟地黃酒浸焙石菖蒲逺志去心枸杞子酒浸焙龍骨楮實茴香炒仙茅肉蓯蓉酒浸焙乾沉香各一兩右為細末棗肉為丸如梧桐子大每服五十丸以硃砂為衣空心溫酒鹽湯送下如有氣滯不順用木香調氣散入鹽少許湯調送下金鎖正元丹治男子五勞七傷沉寒痼冷四肢厥逆隂盛身寒臍腹久痛臟腑軟弱困倦少力飲食遲化澀精補氣久服強健駐顔白僵蠶炒破故紙炒白龍骨山茱茰湯浸去核桑螵蛸炒黑附子炮肉蓯蓉酒浸牛膝酒浸兔絲子酒浸各半兩韭子二兩炒右為細末煉蜜為丸如梧桐子大每服二三十丸空心溫酒送下日進二服常服有益婦人亦可服神應丸治男子婦人五勞七傷大黃六兩去皮淨黃連四兩淨血竭三兩犀角末二兩仙人蓋一箇醋炙黃色九肋鱉甲牛黃二錢靈礬二兩右為末用好醋一斗入砂鍋內文武火熬醋盡焙乾再為極細末酒糊為丸如彈子大每服一丸服藥須要除破日面東男子用酒將藥化開空心溫服婦人用紅花好酒一盞半煎至七分去紅花滓將藥化開面東空心服之服藥後十日內忌生冷酒肉麵等物遺濁鎖精丸治精滑不禁川獨活川續斷榖精草石蓮肉去殼生雞豆去殼蓮心乾菱米川練子酥炒金櫻子緊龍骨五色白茯苓木豬苓小茴香藕節右各等分為細末雞清為丸如梧桐子大每服四五十丸空心鹽湯送下乾物壓之辰砂妙香散治夢中遺精每服一匕虛者溫酒調熱者麥門冬去心濃煎湯調方缺芡實丸治思慮傷心小便赤澀遺精白濁方缺通治還少丹治心腎俱虛漏精白濁山藥炮牛膝去苗酒浸焙山茱茰水洗去核白茯苓舶上茴香炒各一兩半兔絲子酒浸焙研續斷去蘆各一兩右為末煉密丸如梧桐子大每服三十丸鹽湯下分清飲通心氣補漏精治小便餘瀝并赤白濁益智川萆薢石菖蒲鹽炒天台烏藥右等分銼為散入鹽少許煎空心服瑞竹堂經驗方卷一
