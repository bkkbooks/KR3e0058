body:
  text: 瑞竹堂經驗方卷五元沙圗穆蘇編瘡科金砂𣪚治疔瘡硇砂好者雄黃好者右等分研細生蜜調合用角盒子收貯先將銀箆挑破瘡口擠出惡血然後用藥一豆大入瘡口內以紙花貼定即效若毒氣入腹已多嘔吐欲死者即服內托香粉𣪚返魂丹治十三種疔瘡硃砂膽礬各一兩半血竭銅緑蝸牛各一兩生用雄黃白礬枯各二兩輕粉沒藥蟾酥各半兩麝香少許右先搗蝸牛蟾酥極爛旋入諸藥末為丸如雞豆大令病人先嚼葱白三寸吐手心內將藥一丸裹在葱白內用熱酒一盞吞下如重車行五里許有汗出即瘥如不能嚼葱研爛裹藥下曽有一僧貨此藥極有效豫自合救人纍獲效驗真妙方也五聖𣪚大黃一兩生薑一兩瓜蔞一箇皂角針二兩甘草一兩金銀花一兩右㕮咀用好酒二升同煎至八分去滓服不拘時候海上方治疔瘡蟬殼七箇煆為末右為極細末用蜜調搽瘡口立馬回疔丹治疔瘡走暈不止金腳信半錢蟾酥半錢血竭半錢硃砂半錢輕粉龍腦麝香三味各一字沒藥半錢右為細末用生草烏頭汁拌和為鋌麥子長大用時將瘡頂刺破將藥一鋌放瘡口內第二日瘡腫為效破棺丹治消疔黃走暈不止史相方赤芍藥二兩當歸二兩山梔子二兩半甘草牽牛頭末一兩半大黃三兩半牡蠣煆一兩半金銀花一兩半京三稜一兩切片焙乾右為細末煉蜜為丸如彈子大每服一丸食前用童子小便化開服之病重者服一丸半忌酒及生硬物二烏𣪚治發背蜂窩疔瘡便毒等證川烏頭一箇草烏頭一箇右將新瓦一箇新汲水一桶將二烏併瓦浸於水桶內如無新瓦取屋上淨瓦亦可候瓦濕透即將川烏草烏於瓦上磨成膏用磨藥手挑藥貼於瘡口四周如未有瘡口一漫塗藥如三四重紙厚上用紙條透孔貼蓋如藥乾用雞翎蘸水掃濕如此不過三青露𣪚治發背疽一切惡瘡圍之不暈開白芨白蘞白微白芷白蘚皮朴消青黛黃檗大黃天花粉青露𣪚即芙蓉葉老龍皮即老松樹皮右各等分為細末用生薑自然汁調圍敷如乾時再用薑汁調潤內托千金𣪚治腦背癰疽乳梗等惡瘡鄭善明御史救人驗人參當歸黃耆芍藥川芎防風甘草瓜蔞白芷官桂桔梗各三錢金銀花右㕮咀每服七八錢水二大盞煎至七分入酒半盞去滓溫服如痛甚者倍加當歸芍藥或加乳香二錢日進三服兩服之後瘡口內有黑血出者或遍身汗出皆藥之功效也如病熱猛惡須藥一兩水一大碗煎服未成膿者自𣪚已成者不用針砭自透此藥纍經功效不可不𫝊普救衆苦黃連獨活𣪚治背疽一切惡瘡初發腫甚者三四服即消𣪚羌活一錢半獨活半錢防風半錢藁本一錢半黃芩一錢半黃連半錢知母一錢酒浸洗當歸身三錢生地黃二錢酒浸洗防風梢半錢酒浸洗連翹三錢黃耆一錢半人參半錢甘草身一錢炙陳皮半錢蘇木半錢當歸梢半錢桔梗一錢澤㵼七錢甘草梢半錢黃檗一錢半漢防已半錢右㕮咀只作一服水一碗煎至五分入好酒半盞臨卧服併又將滓煎服之前後接服即瘥透膿𣪚治諸癰瘡及貼骨癰不破者不用針刀一服不移時自透纍有效驗蛾口繭用出了蛾兒繭右將繭一箇燒灰用酒調服即透切不可多若服一箇只一箇瘡口若服兩箇三箇即兩箇三箇瘡口切勿輕忽萬應膏治一切惡瘡及刀斧所傷蛇咬狗咬蟲傷牙痛心痛眼痛腹痛腳氣骨節疼痛大人小兒脾癖悉皆貼之若心痛丸如梧桐子大溫醋湯下三十丸肚痛溫酒下三十丸當歸芍藥白蘞白芨白芷木鱉子杏仁輕粉乳香黃耆各一兩巴豆六錢去皮雄黃研一兩好油三斤箆麻子二百餘箇白礬少許沒藥一兩研黃丹二斤血餘三兩淨右先將乳香沒藥黃丹雄黃白礬另研極細外將餘藥銼碎同槐栁條各二兩銼碎箆麻子二百五十箇去皮研碎先入油內浸一二日於鐵鍋內熬用槐栁條各二根二尺長不住手攪微黑色滴水中不𣪚撈去粗滓再用綿濾淨再入鍋內熬滚先下黃丹次下血餘次下白礬雄黃又下乳香沒藥不住手攪至烟盡微熱下輕粉攪勻傾於水盆內浸一宿出盡火毒於瓷器內盛之其功效不能盡述治腎腧惡瘡方雞內金瓦上焙乾百藥煎各等分輕粉一錢胡黃連右為細末燒厚朴油調搽之胡黃連分兩原缺拔毒𣪚敷貼諸般惡瘡大黃東墻上土右為極細末用無根井花水調搽如乾再搽經宿即愈白芷𣪚治身上諸般惡瘡及小兒耳項頭瘡斑貓五箇蟬殼五箇輕粉一錢檳榔三箇香白芷二錢蛇床子二錢硫黃二錢樟腦二錢右為細末羅過却入輕粉再碾極細用香油調搽立效黃耆飲子治一切惡瘡金銀花一兩當歸一兩連翹半兩黃耆半兩生甘草三錢大黃三錢瓜蔞一箇生薑三錢右㕮咀用水一大碗藥一兩浸一宿慢火煎至稠粘却入好酒一升再煎三兩沸去滓頓服砂草油治人食毒物及患一切惡瘡碙砂四兩甘草四兩右用真香油一斤於瓷瓶內浸藥遇人患急令服油一小盞立效浸久尤佳海上方治惡瘡燕窩內外泥糞俱研極細羅過用油調傅防風當歸𣪚治諸般瘡癤及熱毒瘡防風半兩甘草節半兩赤芍藥半兩綿黃耆半兩當歸半兩白芷半兩左纒藤皂角刺肉桂隂證用半兩陽證用一兩大黃陽證用半兩隂證用一錢右㕮咀水四碗砂瓶內煎至兩碗加好酒一碗再煎至二碗放溫作數起服內皂角刺左纒藤加衆藥五倍螵蛸𣪚治頭上瘡俗曰粘瘡絶妙海螵蛸二錢白膠香二錢輕粉半錢右將海螵蛸白膠香同研細却入輕粉再於乳鉢內研極細先用清油將瘡潤了然後將藥末乾摻瘡上只一上可愈甚者二上啞障咽喉乳蛾方雄黃五錢研鬱金五錢白礬二錢半生用研膽礬半錢研右為極細末以竹筒吹喉中立能言語治喉風單雙乳蛾墻上土蜂窩一箇研極細右先將病人舌用楮葉擦破微令血出繼將蜂窠土醋調用鵝毛蘸藥於喉中撚之令痰涎出為效後用扁竹根擂碎冷水調服只服三口利三行即愈就用冷水潄口立愈羅青𣪚治咽喉單雙乳蛾蒲黃五錢羅青三錢研盆消三錢研甘草二錢右為細末每服一錢冷蜜水調細細咽之吞不下雞翎蘸藥喉內掃之立效香粉𣪚治乳蛾即開白礬三錢巴豆二粒去皮輕粉少許麝香少許研右於鐵器內飛白礬至沸入巴豆在上礬枯去巴豆不用只三味為細末和合吹喉栝􅌣𣪚治便癰等惡瘡栝􅌣一箇去皮生薑半兩甘草半兩金銀花三錢牛蒡子三錢微炒右藥不犯銅鐵器槌碎用酒一大升煎數沸空心溫服微利為度立效𣪚治下疳燈心灰入輕粉麝香少許又方治男下疳瘡白礬煆過輕粉麝香蠐螬就滑壓去屎焙乾右為細末先以口含漿水洗淨拭乾用藥敷瘡上日三兩次治瘰癧瘡乾薑不計多少研為細末用生薑自然汁打麵糊和末作丸谷丹為衣每日一次隨瘡大小入藥在內追出膿盡生肉為度瘡口合則已如瘡口不斂再用大黃末以葱白汁調搽即愈仍日服十全內托𣪚二服如瘡腫不破者用野菊花根搗爛煎酒服之仍將煎過菊花根為末敷貼其瘡自消如不消或瘡口已破依前用藥追膿生肉斂口神效潛針丸専治一切瘰癧惡瘡龍腦三分麝香半錢輕粉一錢粉霜一錢雄黃一錢朱色者白丁香二錢真白碙砂半錢金腳信二錢巴豆十箇去心膜右為細末大麥麵為丸如小麥粒大覷瘡大小加减用之如瘡破者兩丸瘡小不破者一丸用針出血至盡任藥後用黃蠟封於針口如瘡腫者不妨不過三日自消此方不可亂𫝊遇仙無比丸專治瘰癧白术生檳榔生甘草生郁李仁湯浸去皮牽牛一半生一半熟炒斑貓糯米炒去皮足翅不用米蜜陀僧防風各等分右為末麵糊為丸如梧桐子大早晚煎甘草檳榔湯送下每服二十丸至月後覺腹中微痛於小便中取下癧子毒物有如魚目狀已破者自合未破者自消治膁瘡好粉用香油調在碗裏上用艾燒烟燻黃色要勻抹在瘡上有效蠟黃膏治膁瘡槐條椿皮桃條楝條栁條荆芥右熬湯不時蕩洗無漿絹帛揾乾用生黃蠟於紙上量瘡大小攤膏一十箇即將十層都拴瘡上三日一洗瘡除去著瘡蠟紙膏藥一箇餘仍貼不消一月無問年深日近必然痊好屢經依方醫治得效驗膁瘡藥方監司傳此方見效輕粉一錢黃連末二錢右用豬膽一箇針刺七孔滴下膽汁於盞內將藥調和用竹攤滿瘡口上用白紙數層蓋藥以無粉青絹緊緊拴住過十日再換藥如法緊拴急救仙方治膁瘡久年不愈者多是腎水虛敗下流又有脾漬溢可服苦參丸補腎水用解毒生肌定痛𣪚後用隔紙膏藥祕𫝊隔紙膏治膁瘡年月深久不愈者老松香樟腦谷丹炒水龍骨即舊船石灰輕粉不愈加白芷川芎螵蛸總為末鎔化松香加少清油和之以油紙隨瘡大小糊袋盛藥夾之用水洗瘡縳在瘡口上二日定四日一換若單用白芷川芎螵蛸三味煎水洗之亦效又方無名異細研清油調搽濕則乾傅其上摻藥治諸瘡口濃水不乾白龍骨二分寒水石三分谷丹飛一分右為細末乾摻瘡口一料以六分為率治瘡腫濕瘡方胡黃連生用輕粉生用海螵蛸生用韶粉煆蛤粉生用橄欖核燒灰黃柏皮各等分右為細末乾貼立效搜膿𣪚治瘡內有膿不能自出內瘡已深須用紙撚蘸藥入於瘡口內白芍藥輕粉各三錢川芎香白芷各一兩右為細末瘡平者摻藥在上生肌𣪚治瘡口不合沒藥黃丹火飛過用赤蘞枯白礬黃蘖乳香各一錢白膠二錢麝香二錢半右為細末先煎葱白鹽湯洗淨揾乾傅藥末於瘡口上桃花𣪚治諸瘡口不合赤蘞炒白蘞炒黃檗炒各三錢輕粉一錢右為細末先用葱白漿水洗淨然後上藥妙功𣪚治疥瘡黃檗蛇床子白礬各等分右為細末用後藥煎油調擦清油二兩黃檗花椒巴豆數粒葱三莖厚朴枳殼各少許右同清油一處熬數沸濾去渣將妙功𣪚於熱油內更加桕燭一二枝放冷調搽一浴𣪚治疥瘡熱毒清油調搽硫黃雄黃漢椒𤣥精石枯白礬各等分輕粉少許早起空心飽食乾物勿飲湯煎大防風通聖𣪚一劑加白砂蜜二兩送神芎丸五七十丸入浴堂內洗令汗出便休浴將疥􅎲破用前藥搽之再入堂內洗如此搽洗三次然後出浴更不須再搽藥剪草𣪚專治頑癬久不能愈者桱樹皮八兩杭州有剪草四兩白芨四兩巴豆斗四箇連殼碾右為細末新汲水調為糊厚厚敷於癬上乾即去之再敷立效不須㧓破治金瘡黃檗四兩好者去粗皮黃連三兩去鬚淨銼黃葵花三兩焙乾降真香末一兩檳榔二兩雞心者佳白芍藥少許以上六味同研為細末木鱉子半兩烏賊骨三兩二味同研為末旋入真龍骨一兩乳鉢另研入蜜陀僧一兩研細真血竭一兩麝香二錢另研輕粉一錢韶粉一兩滴乳二錢另研同於乳鉢內再細研次入黃丹黃丹三兩飛過研右須十分研細和勻用好紙包裹令密勿令透氣候三日方可用凡遇金創所傷血不止者作急用藥乾貼血痛立止或傷日久先用葱鹽湯洗去惡物拭乾再用唾津調藥敷上以紙封蓋瘡口留一竅出膿水又被傷血流太多恐傷斷脉絡血筒急揩去血用藥乾貼之立止治血聚皮不破蘿蔔葉研細罨傷處以帛縳之吸筒以慈竹為之削去青五倍子多用白礬少用些子右藥和筒煮了收起用時再於沸湯煮令熱以筯箝筒乘熱安於患處治針入肉不出臘姑腦子槌碎塗上即出右用硫黃研細調敷以紙花貼定覺癢時其針即出又方用雙杏仁搗爛以車脂調勻貼在針瘡上其針自出治風狗咬方用桃核殼半箇將野人乾即人之大糞也填滿以榆皮蓋定掩於傷處用艾於桃核上灸二七十四炷即愈永不發作雄辛𣪚治惡蛇及風狗所傷細辛蓽茇及雄黃好酒研來入麝香不問惡蛇并惡犬管教一服便安康右各等分為細末每服二錢好酒調下雄靈𣪚治毒蛇所傷昏悶欲死者雄黃半兩明好者研五靈脂一兩真者酒洗去砂石乾用右為細末每服二錢酒調灌之即以藥末調塗瘡口上良久再一服神驗瑞竹堂經驗方卷五
