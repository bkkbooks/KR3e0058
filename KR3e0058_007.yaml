body:
  text: 瑞竹堂經騐方卷五元沙圗穆蘇編瘡科金砂𣪚治疔瘡硇砂好者䧺黄好者右等分研細生蜜調合用角盒子收貯先將銀箆挑破瘡口擠出惡血然後用藥一豆大入瘡口内以紙花貼定即效若毒氣入腹已多嘔吐欲死者即服内托香粉𣪚返䰟丹治十三種疔瘡硃砂膽礬各一兩半血竭銅緑蝸牛各一兩生用䧺黄白礬枯各二兩輕粉没藥蟾酥各半兩麝香少許右先擣蝸牛蟾酥極爛旋入諸藥末為丸如鷄豆大令病人先嚼葱白三寸吐手心内將藥一丸裹在葱白内用熱酒一盞吞下如重車行五里許有汗出即瘥如不能嚼葱研爛裹藥下曽有一僧貨此藥極有效予自合救人累獲效驗真妙方也五聖𣪚大黄一兩生薑一兩𤓰蔞一箇皂角鍼二兩甘草一兩金銀花一兩右㕮咀用好酒二升同煎至八分去滓服不拘時候海上方治疔瘡蟬殻七箇煆為末右為極細末用蜜調搽瘡口立馬囘疔丹治疔瘡走暈不止金脚信半錢蟾酥半錢血竭半錢硃砂半錢輕粉龍腦麝香三味各一字没藥半錢右為細末用生草烏頭汁拌和為鋌麥子長大用時將瘡頂刺破將藥一鋌放瘡口内第二日瘡腫為效破棺丹治消疔黄走暈不止史相方赤芍藥二兩當歸二兩山梔子二兩半甘草牽牛頭末一兩半大黄三兩半牡蠣煆一兩半金銀花一兩半京三稜一兩切片焙乾右為細末煉蜜為丸如彈子大每服一丸食前用童子小便化開服之病重者服一丸半忌酒及生硬物二烏𣪚治發背蜂窩疔瘡便毒等證川烏頭一箇草烏頭一箇右將新瓦一箇新汲水一桶將二烏併瓦浸於水桶内如無新瓦取屋上凈瓦亦可候瓦濕透即將川烏草烏於瓦上磨成膏用磨藥手挑藥貼於瘡口四周如未有瘡口一漫塗藥如三四重紙厚上用紙條透孔貼盖如藥乾用雞翎蘸水掃濕如此不過三青露𣪚治發背疽一切惡瘡圍之不暈開白芨白蘞白㣲白芷白蘚皮朴消青黛黄檗大黄天花粉青露𣪚即芙蓉葉老龍皮即老松樹皮右各等分為細末用生薑自然汁調圍敷如乾時再用薑汁調潤内托千金𣪚治腦背癰疽乳梗等惡瘡鄭善明御史救人驗人参當歸黄耆芍藥川芎防風甘草𤓰蔞白芷官桂桔梗各三錢金銀花右㕮咀每服七八錢水二大盞煎至七分入酒半盞去滓温服如痛甚者倍加當歸芍藥或加乳香二錢日進三服兩服之後瘡口内有黑血出者或遍身汗出皆藥之功效也如病熱猛惡須藥一兩水一大椀煎服未成膿者自𣪚已成者不用針砭自透此藥累經功效不可不𫝊普救衆苦黄連獨活𣪚治背疽一切惡瘡初發腫甚者三四服即消𣪚羌活一錢半獨活半錢防風半錢藁本一錢半黄芩一錢半黄連半錢知母一錢酒浸洗當歸身三錢生地黄二錢酒浸洗防風梢半錢酒浸洗連翹三錢黄耆一錢半人参半錢甘草身一錢炙陳皮半錢蘇木半錢當歸梢半錢桔梗一錢澤㵼七錢甘草梢半錢黄檗一錢半漢防已半錢右㕮咀只作一服水一椀煎至五分入好酒半盞臨卧服併又將滓煎服之前後接服即瘥透膿𣪚治諸癰瘡及貼骨癰不破者不用針刀一服不移時自透累有效驗蛾口蠒用出了蛾兒蠒右將蠒一箇燒灰用酒調服即透切不可多若服一箇只一箇瘡口若服兩箇三箇即兩箇三箇瘡口切勿輕忽萬應膏治一切惡瘡及刀斧所傷蛇咬狗咬蟲傷牙痛心痛眼痛腹痛脚氣骨節疼痛大人小兒脾癖悉皆貼之若心痛丸如梧桐子大温醋湯下三十丸肚痛温酒下三十丸當歸芍藥白蘞白芨白芷木鼈子杏仁輕粉乳香黄耆各一兩巴豆六錢去皮䧺黄研一兩好油三斤箆麻子二百餘箇白礬少許没藥一兩研黄丹二斤血餘三兩凈右先將乳香没藥黄丹䧺黄白礬另研極細外將餘藥剉碎同槐栁條各二兩剉碎箆麻子二百五十箇去皮研碎先入油内浸一二日於鉄鍋内熬用槐栁條各二根二尺長不住手攪㣲黑色滴水中不𣪚撈去麄滓再用綿濾凈再入鍋内熬滚先下黄丹次下血餘次下白礬䧺黄又下乳香没藥不住手攪至烟盡㣲熱下輕粉攪匀傾於水盆内浸一宿出盡火毒於甆器内盛之其功效不能盡述治腎腧惡瘡方鷄内金瓦上焙乾百藥煎各等分輕粉一錢胡黄連右為細末燒厚朴油調搽之胡黄連分兩原缺㧞毒𣪚敷貼諸般惡瘡大黄東墻上土右為極細末用無根井花水調搽如乾再搽經宿即愈白芷𣪚治身上諸般惡瘡及小兒耳項頭瘡斑貓五箇蟬殻五箇輕粉一錢㯽榔三箇香白芷二錢蛇床子二錢硫黄二錢樟腦二錢右為細末羅過却入輕粉再碾極細用香油調搽立效黄耆飲子治一切惡瘡金銀花一兩當歸一兩連翹半兩黄耆半兩生甘草三錢大黄三錢𤓰蔞一箇生薑三錢右㕮咀用水一大椀藥一兩浸一宿慢火煎至稠粘却入好酒一升再煎三兩沸去滓頓服砂草油治人食毒物及患一切惡瘡碙砂四兩甘草四兩右用真香油一斤於甆瓶内浸藥遇人患急令服油一小盞立效浸久尤佳海上方治惡瘡燕窩内外泥糞俱研極細羅過用油調傅防風當歸𣪚治諸般瘡癤及熱毒瘡防風半兩甘草節半兩赤芍藥半兩綿黄耆半兩當歸半兩白芷半兩左纒藤皂角刺肉桂隂證用半兩陽證用一兩大黄陽證用半兩隂證用一錢右㕮咀水四碗砂瓶内煎至兩碗加好酒一椀再煎至二碗放温作數起服内皂角刺左纒藤加衆藥五倍螵蛸𣪚治頭上瘡俗曰粘瘡絶妙海螵蛸二錢白膠香二錢輕粉半錢右將海螵蛸白膠香同研細却入輕粉再於乳鉢内研極細先用清油將瘡潤了然後將藥末乾掺瘡上只一上可愈甚者二上啞障咽喉乳蛾方䧺黄五錢研鬱金五錢白礬二錢半生用研膽礬半錢研右為極細末以竹筒吹喉中立能言語治喉風單雙乳蛾墻上土蜂窩一箇研極細右先將病人舌用楮葉擦破㣲令血出繼將蜂窠土醋調用鵞毛蘸藥於喉中撚之令痰涎出為效後用扁竹根擂碎冷水調服只服三口利三行即愈就用冷水潄口立愈羅青𣪚治咽喉單雙乳蛾蒲黄五錢羅青三錢研盆消三錢研甘草二錢右為細末每服一錢冷蜜水調細細嚥之吞不下雞翎蘸藥喉内掃之立效香粉𣪚治乳蛾即開白礬三錢巴豆二粒去皮輕粉少許麝香少許研右於鐵器内飛白礬至沸入巴豆在上礬枯去巴豆不用只三味為細末和合吹喉栝􅌣𣪚治便癰等惡瘡栝􅌣一箇去皮生薑半兩甘草半兩金銀花三錢牛蒡子三錢㣲炒右藥不犯銅鉄器槌碎用酒一大升煎數沸空心温服㣲利為度立效𣪚治下疳燈心灰入輕粉麝香少許又方治男下疳瘡白礬煆過輕粉麝香蠐螬就滑壓去屎焙乾右為細末先以口含漿水洗凈拭乾用藥敷瘡上日三兩次治瘰癧瘡乾薑不計多少研為細末用生薑自然汁打麫糊和末作丸谷丹為衣每日一次隨瘡大小入藥在内追出膿盡生肉為度瘡口合則已如瘡口不斂再用大黄末以葱白汁調搽即愈仍日服十全内托𣪚二服如瘡腫不破者用野菊花根搗爛煎酒服之仍將煎過菊花根為末敷貼其瘡自消如不消或瘡口已破依前用藥追膿生肉歛口神效潛針丸専治一切瘰癧惡瘡龍腦三分麝香半錢輕粉一錢粉霜一錢䧺黄一錢朱色者白丁香二錢真白碙砂半錢金脚信二錢巴豆十箇去心膜右為細末大麥麫為丸如小麥粒大覷瘡大小加减用之如瘡破者兩丸瘡小不破者一丸用針出血至盡任藥後用黄蠟封於針口如瘡腫者不妨不過三日自消此方不可亂𫝊遇仙無比丸專治瘰癧白术生㯽榔生甘草生郁李仁湯浸去皮牽牛一半生一半熟炒斑貓糯米炒去皮足翅不用米蜜陀僧防風各等分右為末麫糊為丸如梧桐子大早晩煎甘草㯽榔湯送下每服二十丸至月後覺腹中㣲痛於小便中取下癧子毒物有如魚目狀已破者自合未破者自消治膁瘡好粉用香油調在碗裏上用艾燒烟燻黄色要勻抹在瘡上有效蠟黄膏治膁瘡槐條椿皮桃條楝條栁條荆芥右熬湯不時盪洗無漿絹帛揾乾用生黄蠟於紙上量瘡大小攤膏一十箇即將十層都拴瘡上三日一洗瘡除去着瘡蠟紙膏藥一箇餘仍貼不消一月無問年深日近必然痊好屢經依方醫治得效騐膁瘡藥方監司傳此方見效輕粉一錢黄連末二錢右用豬膽一箇針刺七孔滴下膽汁於盞内將藥調和用竹攤滿瘡口上用白紙數層盖藥以無粉青絹緊緊拴住過十日再換藥如法緊拴急救仙方治膁瘡久年不愈者多是腎水虚敗下流又有脾漬溢可服苦参丸補腎水用解毒生肌定痛𣪚後用隔紙膏藥秘𫝊隔紙膏治膁瘡年月深久不愈者老松香樟腦谷丹炒水龍骨即舊船石灰輕粉不愈加白芷川芎螵蛸總為末鎔化松香加少清油和之以油紙隨瘡大小糊袋盛藥夾之用水洗瘡縳在瘡口上二日定四日一換若單用白芷川芎螵蛸三味煎水洗之亦效又方無名異細研清油調搽濕則乾傅其上掺藥治諸瘡口濃水不乾白龍骨二分寒水石三分谷丹飛一分右為細末乾掺瘡口一料以六分為率治瘡腫濕瘡方胡黄連生用輕粉生用海螵蛸生用韶粉煆蛤粉生用橄欖核燒灰黄栢皮各等分右為細末乾貼立效搜膿𣪚治瘡内有膿不能自出内瘡已深須用紙撚蘸藥入於瘡口内白芍藥輕粉各三錢川芎香白芷各一兩右為細末瘡平者掺藥在上生肌𣪚治瘡口不合没藥黄丹火飛過用赤蘞枯白礬黄蘖乳香各一錢白膠二錢麝香二錢半右為細末先煎葱白鹽湯洗凈揾乾傅藥末於瘡口上桃花𣪚治諸瘡口不合赤蘞炒白蘞炒黄檗炒各三錢輕粉一錢右為細末先用葱白漿水洗凈然後上藥妙功𣪚治疥瘡黄檗蛇床子白礬各等分右為細末用後藥煎油調擦清油二兩黄檗花椒巴豆數粒葱三莖厚朴枳殻各少許右同清油一處熬數沸濾去渣將妙功𣪚於熱油内更加桕燭一二枝放冷調搽一浴𣪚治疥瘡熱毒清油調搽硫黄䧺黄漢椒𤣥精石枯白礬各等分輕粉少許早起空心飽食乾物勿飲湯煎大防風通聖𣪚一劑加白砂蜜二兩送神芎丸五七十丸入浴堂内洗令汗出便休浴將疥􅎲破用前藥搽之再入堂内洗如此搽洗三次然後出浴更不須再搽藥剪草𣪚專治頑癬久不能愈者桱樹皮八兩杭州有剪草四兩白芨四兩巴豆斗四箇連殻碾右為細末新汲水調為糊厚厚敷於癬上乾即去之再敷立效不須㧓破治金瘡黄檗四兩好者去麄皮黄連三兩去鬚凈剉黄葵花三兩焙乾降真香末一兩㯽榔二兩雞心者佳白芍藥少許以上六味同研為細末木鼈子半兩烏賊骨三兩二味同研為末旋入真龍骨一兩乳鉢另研入蜜陀僧一兩研細真血竭一兩麝香二錢另研輕粉一錢韶粉一兩滴乳二錢另研同於乳鉢内再細研次入黄丹黄丹三兩飛過研右須十分研細和勻用好紙包裹令宻勿令透氣候三日方可用凡遇金刅所傷血不止者作急用藥乾貼血痛立止或傷日久先用葱鹽湯洗去惡物拭乾再用唾津調藥敷上以紙封盖瘡口留一竅出膿水又被傷血流太多恐傷斷脉絡血筒急揩去血用藥乾貼之立止治血聚皮不破蘿蔔葉研細罨傷處以帛縳之吸筒以慈竹為之削去青五倍子多用白礬少用些子右藥和筒煑了收起用時再於沸湯煑令熱以筯箝筒乘熱安於患處治針入肉不出臘姑腦子槌碎塗上即出右用硫黄研細調敷以紙花貼定覺癢時其針即出又方用雙杏仁擣爛以車脂調匀貼在針瘡上其針自出治風狗咬方用桃核殻半箇將野人乾即人之大糞也填滿以榆皮盖定掩於傷處用艾於桃核上灸二七十四炷即愈永不發作䧺辛𣪚治惡蛇及風狗所傷細辛蓽茇及䧺黄好酒研來入麝香不問惡蛇并惡犬管教一服便安康右各等分為細末每服二錢好酒調下雄靈𣪚治毒蛇所傷昏悶欲死者雄黄半兩明好者研五靈脂一兩真者酒洗去砂石乾用右為細末每服二錢酒調灌之即以藥末調塗瘡口上良久再一服神騐瑞竹堂經騐方卷五
