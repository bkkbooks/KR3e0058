body:
  text: 瑞竹堂經驗方卷四元沙圗穆蘇編女科飬氣丹治婦人年未及四十嵗天癸斷行每服五丸空心溫酒送下在和劑局方芩心丸治婦人四十九嵗已後天癸當住每月却行或過多不止黃芩心枝條者二兩重用米醋浸七日炙乾又浸又炙如此七次右為細末醋糊為丸如梧桐子大每服七十丸空心溫酒送下日進二服八珍𣪚治月水不調臍腹㽱痛全不思食臟腑怯弱泄㵼小腹堅痛時作寒熱此藥調暢榮衛滋飬氣血能補虛損當歸去蘆川芎熟地黃白芍藥人參去蘆甘草炙茯苓去皮白术各一兩右㕮咀每服三錢水一盞半生薑五片棗一枚煎至七分去滓不拘時候通口服血竭𣪚治婦人臍下血積疼痛血竭乳香沒藥並别研水蛭鹽炒煙盡白芍藥當歸麝香各一錢虎骨火炙油盡黃一錢六分右為極細末每服三錢空心溫酒調服沉香𣪚治婦人一切血氣刺痛不可忍者及男子冷氣痛並皆治之沉香木香當歸白茯苓白芍藥各一錢右㕮咀每服一錢水三盞銀石器內文武火煎數沸入全陳皮一箇又煎十沸入好醋一盞又煎十數沸入乳香沒藥如皂角子大一塊同煎至一盞去滓通口服不拘時候治婦人血崩不止婦人油頭髮半兩燒灰千針草灰半兩右為細末每服三錢淋火煆稱錘調服治婦人吹妳鼠糞五十粒麝香一字右為細末食後用熱酒一盞調服立愈治産後血塊腹痛京芎炒川當歸炒乾地黃洗芍藥各半兩蒲黃一分銚內隔紙炒香右同為細末每服三錢空心溫酒調服幼科長生丸治小兒清上實下補脾治痰出陳文仲方木香半兩檳榔三兩不見火枳殼一兩去瓤麵裹煨丁香三錢半夏三錢薑湯泡七次全蝎三十箇去毒尖肉豆蔲三錢縮砂三錢右除肉豆蔲外同為細末次入豆蔲再研極細末用飲和為丸如粟米大小兒每服三五十丸空心乳汁飲湯送下服訖候半時方進乳食日進三服吐乳者胃冷宜服此藥大便酸臭是傷食乳食不消是脾虛宜服此藥十金𣪚治小兒脾積其效甚速錦紋大黃不計多少為細末用米醋熬成膏澆於新磚瓦上再將大黃傾上用伏內日曬夜露乾為末舶上硫黃官粉各等分右為極細末每於食後米飲調下一嵗小兒一服半錢二三嵗服一錢十嵗以下服二錢十六七嵗服五錢一服即效如不愈隔二十日再一服更不須再服切忌生冷濕麵馬驢豬魚雞等肉如不能忌口枉服此藥曽經親手救人但能忌口者醫之必愈褐丸子治小兒隂陽不和臟腑怯弱乳食不消心腹脹滿嘔逆氣急或腸鳴泄㵼頻併腹中冷痛食癥乳癖痃氣痞結積聚腸胃或祕或利頭靣浮腫不思乳食及療五種疳氣八腫痢疾肌肉消瘦氣粗腹大神色昏憒情意不樂常服𣪚冷熱氣調和藏府去疳積止㵼痢進飲食生肌肉悅顔色功效異常不能盡述出活幼口訣方蘿蔔子二兩微炒陳皮去白一兩青皮去白一兩黑牽牛一兩半一半生用一半炒京三稜一兩泡蓬莪蒁一兩泡胡椒半兩木香一分不見火右為細末水煮麵糊為丸如梧桐子大每服二三十丸空心用蘿蔔子煎湯或薑湯送下看兒大小加減服之磨積丸専治小兒疳積泄㵼等疾荆三稜蓬莪蒁陳皮去白青皮去白神麴炒麥芽炒川鬱金胡黃連雷丸白者香附子炒去毛與三稜莪蒁陳皮青皮五件一處用好米醋煮一晝夜焙乾使君子肉切焙蘆會各等分右為細末米醋糊為丸如豌豆大每服三十丸糯米湯下茶湯亦可虛弱加木香虛極加癩蚵蚾肉如聖𣪚治小兒口瘡不能喫乳者川江子一粒或二粒右研爛不去油入硃砂或黃丹赤土少許剃開小兒𩕄門貼在𩕄上如四邊起粟米泡便用溫水洗去藥恐成瘡便用菖蒲水洗便安其效如神治小兒出瘡疹眼內有雲翳方輕粉黃丹各等分右為末竹筒吹在耳內左眼有翳吹左耳右眼有翳吹右耳即退治小兒大人熱丹瘡成片可取絲茅草葉將丹瘡刮破即愈治小兒丹瘤綿羊腦子生用朴消右二味調勻貼於瘤上立效治小兒凍印瘡方用黑騾糞曬乾燒灰清油調搽立效大黃膏治小兒大人痺癖大黃朴硝各等分右為細末同蒜泥和成膏用絹帛攤成膏藥貼於病處其痺病自軟消白丁香雀兒糞也黑丁香二錢木香二錢蜜陀僧三錢硫黃二錢訶子皮輕粉半錢右為細末每服一錢用妳汁調服女兒用男兒妳汁調服男兒用女兒妳汁調服食前半飢半飽服日進三服用棗壓藥大人用米飲空心調服瑞竹堂經驗方卷四
